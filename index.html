            --primary: #7c3aed;
            --secondary: #a855f7;
            --dark: #0f172a;
            --light: #f8fafc;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --gradient-5: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Header */
        header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .search-box {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }

        .categories {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 1rem 2rem;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .category-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 50px;
            background: #f1f5f9;
            color: #334155;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-btn:hover {
            background: var(--gradient-1);
            color: white;
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: var(--gradient-1);
            color: white;
        }

        /* Games Grid */
        .games-grid {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-image {
            height: 200px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .game-image i {
            font-size: 5rem;
            color: white;
            opacity: 0.8;
        }

        .game-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--gradient-2);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .game-age {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
        }

        .game-info {
            padding: 1.5rem;
        }

        .game-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-rating {
            color: #f59e0b;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .game-category {
            display: inline-block;
            padding: 0.3rem 1rem;
            background: #f1f5f9;
            border-radius: 50px;
            font-size: 0.8rem;
            color: #475569;
            margin-bottom: 1rem;
        }

        .game-description {
            color: #64748b;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .play-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: var(--gradient-1);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .play-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(124,58,237,0.4);
        }

        /* Game Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            position: relative;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .close-modal {
            position: fixed;
            top: 1rem;
            left: 1rem;
            width: 50px;
            height: 50px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 2001;
            transition: all 0.3s;
        }

        .close-modal:hover {
            transform: rotate(90deg);
            background: var(--gradient-2);
        }

        .game-wrapper {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Game Canvas */
        .game-canvas {
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 4px solid transparent;
            border-image: var(--gradient-1);
            border-image-slice: 1;
        }

        /* Game Elements */
        .player {
            position: absolute;
            width: 50px;
            height: 50px;
            background: var(--gradient-1);
            border-radius: 50%;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(124,58,237,0.5);
        }

        .enemy {
            position: absolute;
            width: 40px;
            height: 40px;
            background: var(--gradient-2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            animation: moveEnemy 3s linear;
        }

        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background: gold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            animation: rotate 1s linear infinite;
        }

        .bullet {
            position: absolute;
            width: 10px;
            height: 10px;
            background: yellow;
            border-radius: 50%;
            box-shadow: 0 0 10px yellow;
        }

        @keyframes moveEnemy {
            from { top: 0; }
            to { top: 90%; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Game Controls */
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            background: var(--gradient-1);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;

        .control-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(124,58,237,0.4);
        }

        .control-btn.danger {
            background: var(--danger);
        }

        .game-status {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 1rem 0;
            padding: 1rem;
            background: var(--gradient-1);
            color: white;
            border-radius: 50px;
        }

        /* Loading */
        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2002;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer */
        footer {
            background: white;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            color: #64748b;
        }

        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
            }
            
            .search-box {
                max-width: 100%;
            }
            
            .game-canvas {
                height: 400px;
            }
        }
    </style>

        // ==================== GAME INITIALIZATION ====================
        function initGame(game) {
            console.log(`بدء لعبة: ${game.title}`);
            
            // Initialize based on game type
            switch(game.type) {
                case 'adventure_collector':
                case 'adventure_pirate':
                case 'adventure_forest':
                case 'adventure_hunter':
                case 'adventure_egypt':
                case 'adventure_space':
                case 'adventure_ocean':
                    initAdventureGame();
                    break;
                case 'war_future':
                case 'war_strategy':
                case 'war_tank':
                case 'war_sniper':
                case 'war_jet':
                    initWarGame();
                    break;
                case 'action_fighting':
                case 'action_ninja':
                case 'action_boxing':
                    initActionGame();
                    break;
                case 'puzzle_memory':
                    initMemoryGame();
                    break;
                case 'racing_car':
                case 'racing_bike':
                    initRacingGame();
                    break;
            }
        }

        // ==================== GAME LOGIC ====================
        let playerPosition = 50;
        let score = 0;
        let coins = [];
        let enemies = [];
        let gameInterval;

        function initAdventureGame() {
            const canvas = document.getElementById('gameCanvas');
            if (!canvas) return;
            
            // Clear previous interval
            if (gameInterval) clearInterval(gameInterval);
            
            // Create coins
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createCoin();
                }, i * 1000);
            }
            
            // Create enemies
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    createEnemy();
                }, i * 2000);
            }
            
            // Update game loop
            gameInterval = setInterval(() => {
                checkCollisions();
                updateStatus();
            }, 100);
        }

        function initWarGame() {
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = '🎯 اضرب الاهداف';
            
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createEnemy();
                }, i * 500);
            }
        }

        function initActionGame() {
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = '👊 قاتل بقوة';
        }

        function initMemoryGame() {
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = '🧠 ابحث عن المتطابق';
        }

        function initRacingGame() {
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = '🏁 انطلق';
        }

        function createCoin() {
            const canvas = document.getElementById('gameCanvas');
            if (!canvas) return;
            
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.innerHTML = '💰';
            coin.style.left = Math.random() * 90 + '%';
            coin.style.top = '0%';
            
            coin.onclick = function() {
                collectCoin(this);
            };
            
            canvas.appendChild(coin);
            
            // Animate down
            setTimeout(() => {
                if (coin.parentNode) {
                    coin.style.top = '90%';
                }
            }, 50);
            
            // Remove after animation
            setTimeout(() => {
                if (coin.parentNode) {
                    coin.remove();
                }
            }, 4000);
        }

        function createEnemy() {
            const canvas = document.getElementById('gameCanvas');
            if (!canvas) return;
            
            const enemy = document.createElement('div');
            enemy.className = 'enemy';
            enemy.innerHTML = '👾';
            enemy.style.left = Math.random() * 90 + '%';
            enemy.style.top = '0%';
            
            canvas.appendChild(enemy);
            
            // Animate down
            setTimeout(() => {
                if (enemy.parentNode) {
                    enemy.style.top = '90%';
                }
            }, 50);
            
            // Remove after animation
            setTimeout(() => {
                if (enemy.parentNode) {
                    enemy.remove();
                }
            }, 3000);
        }

        function collectCoin(coinElement) {
            coinElement.remove();
            score += 10;
            updateScore();
            
            // Create new coin
            createCoin();
        }

        function updateScore() {
            const status = document.getElementById('gameStatus');
            if (status) {
                status.innerHTML = `💰 النقاط: ${score}`;
            }
        }

        }

        // Player movement
        function movePlayer(direction) {
            const player = document.getElementById('player');
            if (!player) return;
            
            if (direction === 'left') {
                playerPosition = Math.max(0, playerPosition - 5);
            } else {
                playerPosition = Math.min(95, playerPosition + 5);
            }
            
            player.style.left = playerPosition + '%';
        }

        window.flipCard = function(card) {
            if (card.innerHTML === '?') {
                const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
                card.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                card.style.background = 'var(--gradient-2)';

        // Dress up
        window.changeDress = function(item) {
            const princess = document.querySelector('.game-canvas div[style*="font-size: 8rem;"]');
            if (princess) {
                princess.innerHTML += item;
            }
        };

        // Animal sounds
        window.playAnimalSound = function(animal) {
            const sounds = {
                '🐶': 'هوهو',
                '🐱': 'مياو',
                '🐮': 'موو',
                '🐔': 'كو كو'
            };
            alert(`الحيوان ${animal} يقول ${sounds[animal]}`);
        };

        // Reset game
        window.resetGame = function() {
            score = 0;
            updateScore();
            
            const canvas = document.getElementById('gameCanvas');
            if (canvas) {
                const elements = canvas.querySelectorAll('.coin, .enemy');
                elements.forEach(el => el.remove());
            }
            
            playerPosition = 50;
            const player = document.getElementById('player');
            if (player) player.style.left = '50%';
        };

        // Close game
        window.closeGame = function() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameWrapper').innerHTML = '';
            if (gameInterval) clearInterval(gameInterval);
        };

        window.openGame = openGame;

        // Category filtering
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category;
                displayGames();
            });
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            currentGames = games.filter(g => 
                g.title.toLowerCase().includes(term) || 
                g.description.toLowerCase().includes(term) ||
                g.category.toLowerCase().includes(term)
            );
            displayGames();
        });

        // Initial display
        displayGames();

        console.log(`تم تحميل ${games.length} لعبة`);
