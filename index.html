<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العابي - العاب HTML5 تفاعلية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        /* Header */
        header {
            background: white;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
            padding: 1rem 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1.5rem;
            border: 2px solid #eef2f6;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 4px rgba(42,82,152,0.1);
        }

        .categories {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }

        .category-btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            background: white;
            color: #333;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .category-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-preview {
            height: 200px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .game-preview i {
            font-size: 5rem;
            color: white;
            opacity: 0.8;
            transition: all 0.3s;
        }

        .game-card:hover .game-preview i {
            transform: scale(1.1) rotate(5deg);
        }

        .game-info {
            padding: 1.5rem;
        }

        .game-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .game-category {
            background: #eef2f6;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            color: #666;
            font-weight: 600;
        }

        .game-age {
            background: #2a5298;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .game-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .play-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .play-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(42,82,152,0.4);
        }

        /* Game Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding: 2rem;
        }

        .close-modal {
            position: fixed;
            top: 1rem;
            left: 1rem;
            width: 50px;
            height: 50px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .close-modal:hover {
            transform: scale(1.1);
            background: #ff0000;
        }

        .game-container {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #eef2f6;
        }

        .game-header h2 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .game-header p {
            color: #666;
        }

        /* Simple Games */
        .game-area {
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Memory Game */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .memory-card {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .memory-card.flipped {
            background: white;
            color: #1e3c72;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .memory-card.matched {
            background: #4caf50;
            color: white;
            cursor: default;
            opacity: 0.7;
        }

        /* Tic Tac Toe */
        .ttt-grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            margin: 20px 0;
        }

        .ttt-cell {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ttt-cell:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .game-status {
            font-size: 1.2rem;
            margin: 20px 0;
            padding: 1rem 2rem;
            background: #eef2f6;
            border-radius: 10px;
            font-weight: 600;
        }

        .reset-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .reset-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Footer */
        footer {
            background: white;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            color: #666;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
            }
            
            .search-box {
                max-width: 100%;
            }
            
            .memory-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .ttt-grid {
                grid-template-columns: repeat(3, 70px);
            }
            
            .ttt-cell {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
        }
    </style>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">🎮 العابي</div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 ابحث عن لعبة...">
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="categories">
            <button class="category-btn active" data-category="all">الكل</button>
            <button class="category-btn" data-category="ذكاء">🧠 العاب ذكاء</button>
            <button class="category-btn" data-category="حرب">⚔️ العاب حرب</button>
            <button class="category-btn" data-category="مغامرة">🏃 العاب مغامرة</button>
            <button class="category-btn" data-category="بنات">👗 العاب بنات</button>
            <button class="category-btn" data-category="اطفال">🧸 العاب اطفال</button>
        </div>

        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <!-- Game Modal -->
    <div class="modal" id="gameModal">
        <button class="close-modal" onclick="closeGame()">&times;</button>
        <div class="modal-content">
            <div class="game-container" id="gameContainer"></div>
        </div>
    </div>

    <footer>
        <p>© 2024 العابي - جميع الالعاب مجانية ومضمنة 100%</p>
    </footer>

    <script>
        // Game definitions with embedded games
        const games = [
            // Memory Game
            { 
                id: 1, 
                title: "لعبة الذاكرة", 
                category: "ذكاء", 
                age: "4+", 
                icon: "fa-brain", 
                description: "اختبر ذاكرتك في لعبة المطابقة", 
                type: "memory"
            },
            // Tic Tac Toe
            { 
                id: 2, 
                title: "اكس او", 
                category: "ذكاء", 
                age: "5+", 
                icon: "fa-hashtag", 
                description: "اللعبة الشهيرة اكس او", 
                type: "tictactoe"
            },
            // Number Guessing
            { 
                id: 3, 
                title: "خمن الرقم", 
                category: "ذكاء", 
                age: "6+", 
                icon: "fa-question", 
                description: "خمن الرقم السري من 1 الى 100", 
                type: "guess"
            },
            // Rock Paper Scissors
            { 
                id: 4, 
                title: "حجر ورقة مقص", 
                category: "اطفال", 
                age: "3+", 
                icon: "fa-hand-back-fist", 
                description: "اللعبة الشهيرة حجر ورقة مقص", 
                type: "rps"
            },
            // Simple Math Game
            { 
                id: 5, 
                title: "تحدي الرياضيات", 
                category: "ذكاء", 
                age: "6+", 
                icon: "fa-calculator", 
                description: "اختبر مهاراتك في الرياضيات", 
                type: "math"
            },
            // Reaction Game
            { 
                id: 6, 
                title: "اختبار السرعة", 
                category: "اطفال", 
                age: "4+", 
                icon: "fa-gauge-high", 
                description: "اضغط على الاشكال بسرعة", 
                type: "reaction"
            },
            // Color Matching
            { 
                id: 7, 
                title: "تطابق الالوان", 
                category: "اطفال", 
                age: "3+", 
                icon: "fa-palette", 
                description: "طابق الالوان المتشابهة", 
                type: "colors"
            },
            // Simple Puzzle
            { 
                id: 8, 
                title: "اللغز المنزلق", 
                category: "ذكاء", 
                age: "5+", 
                icon: "fa-puzzle-piece", 
                description: "رتب الارقام من 1 الى 15", 
                type: "puzzle"
            },
            // War Game - Simple Shooting
            { 
                id: 9, 
                title: "مطلق النار", 
                category: "حرب", 
                age: "6+", 
                icon: "fa-gun", 
                description: "اضرب الاهداف المتحركة", 
                type: "shooting"
            },
            // Adventure Game
            { 
                id: 10, 
                title: "جامع الكنوز", 
                category: "مغامرة", 
                age: "4+", 
                icon: "fa-map", 
                description: "اجمع الكنوز وتجنب العقبات", 
                type: "collector"
            },
            // Girls Game - Dress Up
            { 
                id: 11, 
                title: "تلبيس الاميرة", 
                category: "بنات", 
                age: "3+", 
                icon: "fa-crown", 
                description: "البس الاميرة اجمل الملابس", 
                type: "dressup"
            },
            // Kids Game - Animal Sounds
            { 
                id: 12, 
                title: "اصوات الحيوانات", 
                category: "اطفال", 
                age: "2+", 
                icon: "fa-dog", 
                description: "تعلم اصوات الحيوانات", 
                type: "animals"
            },
            // More games with same types but different titles
            { 
                id: 13, 
                title: "بطاقات الذاكرة", 
                category: "ذكاء", 
                age: "4+", 
                icon: "fa-cards", 
                description: "لعبة الذاكرة مع البطاقات", 
                type: "memory"
            },
            { 
                id: 14, 
                title: "اكس او المتقدمة", 
                category: "ذكاء", 
                age: "6+", 
                icon: "fa-hashtag", 
                description: "العب اكس او مع الكمبيوتر", 
                type: "tictactoe"
            },
            { 
                id: 15, 
                title: "ارقام سريعة", 
                category: "ذكاء", 
                age: "5+", 
                icon: "fa-calculator", 
                description: "حل المسائل الحسابية بسرعة", 
                type: "math"
            },
            { 
                id: 16, 
                title: "دبابات", 
                category: "حرب", 
                age: "5+", 
                icon: "fa-tank", 
                description: "دمر الدبابات المعادية", 
                type: "shooting"
            },
            { 
                id: 17, 
                title: "مغامر الفضاء", 
                category: "مغامرة", 
                age: "4+", 
                icon: "fa-rocket", 
                description: "اجمع النجوم في الفضاء", 
                type: "collector"
            },
            { 
                id: 18, 
                title: "صالون التجميل", 
                category: "بنات", 
                age: "4+", 
                icon: "fa-scissors", 
                description: "صففي الشعر واختاري الالوان", 
                type: "dressup"
            },
            { 
                id: 19, 
                title: "حديقة الحيوان", 
                category: "اطفال", 
                age: "2+", 
                icon: "fa-paw", 
                description: "تعرف على حيوانات الحديقة", 
                type: "animals"
            },
            { 
                id: 20, 
                title: "سباق الالوان", 
                category: "اطفال", 
                age: "3+", 
                icon: "fa-car", 
                description: "طابق الالوان بسرعة", 
                type: "colors"
            },
            // Add more games with the same types to reach 100
            ...Array.from({ length: 80 }, (_, i) => {
                const types = ['memory', 'tictactoe', 'guess', 'rps', 'math', 'reaction', 'colors', 'puzzle', 'shooting', 'collector', 'dressup', 'animals'];
                const categories = ['ذكاء', 'حرب', 'مغامرة', 'بنات', 'اطفال'];
                const titles = [
                    'لعبة رائعة', 'تحدي جديد', 'مغامرة شيقة', 'لعبة مسلية', 'تحدي العقل',
                    'لعبة ممتعة', 'تحدي سريع', 'لعبة تعليمية', 'لعبة تفاعلية', 'لعبة عائلية'
                ];
                const icons = ['fa-star', 'fa-heart', 'fa-gamepad', 'fa-dice', 'fa-chess-board', 'fa-puzzle-piece'];
                
                const type = types[i % types.length];
                let category;
                if (type === 'memory' || type === 'tictactoe' || type === 'guess' || type === 'math' || type === 'puzzle') category = 'ذكاء';
                else if (type === 'shooting') category = 'حرب';
                else if (type === 'collector') category = 'مغامرة';
                else if (type === 'dressup') category = 'بنات';
                else category = 'اطفال';
                
                return {
                    id: i + 21,
                    title: `${titles[i % titles.length]} ${i + 1}`,
                    category: category,
                    age: ['2+', '3+', '4+', '5+', '6+'][i % 5],
                    icon: icons[i % icons.length],
                    description: `استمتع بهذه اللعبة الرائعة رقم ${i + 21}`,
                    type: type
                };
            })
        ];

        // Filter and search state
        let currentCategory = 'all';
        let currentGames = [...games];

        // Display games
        function displayGames() {
            const grid = document.getElementById('gamesGrid');
            const filteredGames = currentCategory === 'all' 
                ? currentGames 
                : currentGames.filter(game => game.category === currentCategory);

            grid.innerHTML = filteredGames.map(game => `
                <div class="game-card" onclick="openGame(${game.id})">
                    <div class="game-preview">
                        <i class="fas ${game.icon}"></i>
                    </div>
                    <div class="game-info">
                        <h3 class="game-title">${game.title}</h3>
                        <div class="game-meta">
                            <span class="game-category">${game.category}</span>
                            <span class="game-age">${game.age}</span>
                        </div>
                        <p class="game-description">${game.description}</p>
                        <button class="play-btn">العب الان</button>
                    </div>
                </div>
            `).join('');
        }

        // Open game
        function openGame(gameId) {
            const game = games.find(g => g.id === gameId);
            const container = document.getElementById('gameContainer');
            
            let gameHTML = '';
            
            switch(game.type) {
                case 'memory':
                    gameHTML = getMemoryGame(game);
                    break;
                case 'tictactoe':
                    gameHTML = getTicTacToeGame(game);
                    break;
                case 'guess':
                    gameHTML = getGuessGame(game);
                    break;
                case 'rps':
                    gameHTML = getRockPaperScissorsGame(game);
                    break;
                case 'math':
                    gameHTML = getMathGame(game);
                    break;
                case 'reaction':
                    gameHTML = getReactionGame(game);
                    break;
                case 'colors':
                    gameHTML = getColorsGame(game);
                    break;
                case 'puzzle':
                    gameHTML = getPuzzleGame(game);
                    break;
                case 'shooting':
                    gameHTML = getShootingGame(game);
                    break;
                case 'collector':
                    gameHTML = getCollectorGame(game);
                    break;
                case 'dressup':
                    gameHTML = getDressupGame(game);
                    break;
                case 'animals':
                    gameHTML = getAnimalsGame(game);
                    break;
                default:
                    gameHTML = getDefaultGame(game);
            }
            
            container.innerHTML = gameHTML;
            document.getElementById('gameModal').style.display = 'block';
            
            // Initialize game
            if (game.type === 'memory') initMemoryGame(game.id);
            else if (game.type === 'tictactoe') initTicTacToe(game.id);
            else if (game.type === 'guess') initGuessGame(game.id);
            else if (game.type === 'rps') initRPS(game.id);
            else if (game.type === 'math') initMathGame(game.id);
            else if (game.type === 'reaction') initReactionGame(game.id);
            else if (game.type === 'colors') initColorsGame(game.id);
            else if (game.type === 'puzzle') initPuzzleGame(game.id);
            else if (game.type === 'shooting') initShootingGame(game.id);
            else if (game.type === 'collector') initCollectorGame(game.id);
            else if (game.type === 'dressup') initDressupGame(game.id);
            else if (game.type === 'animals') initAnimalsGame(game.id);
        }

        window.openGame = openGame;

        // Memory Game
        function getMemoryGame(game) {
            return `
                <div class="game-header">
                    <h2>${game.title}</h2>
                    <p>${game.description}</p>
                </div>
                <div class="game-area">
                    <div class="memory-grid" id="memory-grid-${game.id}"></div>
                    <div class="game-status" id="memory-status-${game.id}">العب واختبر ذاكرتك!</div>
                    <button class="reset-btn" onclick="resetMemoryGame(${game.id})">لعبة جديدة</button>
                </div>
            `;
        }

        function initMemoryGame(gameId) {
            const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
            const cards = [...emojis, ...emojis];
            const shuffled = cards.sort(() => Math.random() - 0.5);
            
            const grid = document.getElementById(`memory-grid-${gameId}`);
            if (!grid) return;
            
            grid.innerHTML = shuffled.map((emoji, index) => `
                <div class="memory-card" data-index="${index}" data-emoji="${emoji}" onclick="flipCard(${gameId}, ${index})">
                    ❓
                </div>
            `).join('');
            
            window[`memoryState_${gameId}`] = {
                flipped: [],
                matched: [],
                lockBoard: false
            };
        }

        function flipCard(gameId, index) {
            const state = window[`memoryState_${gameId}`];
            const card = document.querySelector(`#memory-grid-${gameId} .memory-card[data-index="${index}"]`);
            
            if (state.lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.classList.add('flipped');
            card.textContent = card.dataset.emoji;
            
            state.flipped.push({ index, emoji: card.dataset.emoji });
            
            if (state.flipped.length === 2) {
                state.lockBoard = true;
                
                if (state.flipped[0].emoji === state.flipped[1].emoji) {
                    // Match found
                    state.flipped.forEach(f => {

        function initTicTacToe(gameId) {
            const grid = document.getElementById(`ttt-grid-${gameId}`);

            grid.innerHTML = Array(9).fill(null).map((_, index) => `

            };

        function makeMove(gameId, index) {
            const state = window[`tttState_${gameId}`];
            if (state.gameOver || state.board[index]) return;
            
            state.board[index] = state.currentPlayer;
            const cell = document.querySelector(`#ttt-grid-${gameId} .ttt-cell[data-index="${index}"]`);
            cell.textContent = state.currentPlayer;
            
            // Check winner
            const winner = checkWinner(state.board);
            const status = document.getElementById(`ttt-status-${gameId}`);
            
            if (winner) {
                status.textContent = `🎉 اللاعب ${winner} فاز! 🎉`;
                state.gameOver = true;
            } else if (!state.board.includes(null)) {
                status.textContent = '🤝 تعادل! 🤝';
                state.gameOver = true;
            } else {
                state.currentPlayer = state.currentPlayer === 'X' ? 'O' : 'X';
                status.textContent = `دور اللاعب ${state.currentPlayer}`;
                
                // Simple AI for O
                if (state.currentPlayer === 'O' && !state.gameOver) {

            const state = window[`tttState_${gameId}`];
            if (state.gameOver) return;
            
            // Simple AI: take center or random empty cell
            let move;
            if (!state.board[4]) {
                move = 4;
            } else {
                const emptyCells = state.board.reduce((acc, cell, index) => {
                    if (!cell) acc.push(index);
                    return acc;
                }, []);
                move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            }
            
            makeMove(gameId, move);
        }

            const lines = [

                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];
            
            for (let line of lines) {
                const [a,b,c] = line;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            return null;
        }

                state.numbers[index] = null;
                state.emptyIndex = index;

            state.score = 0;
            updateCollectorScore(gameId);
            
            state.intervalId = setInterval(() => {
                createCoin(gameId);
            }, 1500);
        }

        function createCoin(gameId) {
            const container = document.querySelector(`#collector-status-${gameId}`).parentElement;
            const coin = document.createElement('div');
            
            coin.style.position = 'absolute';
            coin.style.left = Math.random() * 90 + '%';
            coin.style.top = '0%';
            coin.style.width = '30px';
            coin.style.height = '30px';
            coin.style.background = 'gold';
            coin.style.borderRadius = '50%';
            coin.style.transition = 'top 4s linear';
            coin.className = 'coin';
            
            container.appendChild(coin);
            
            // Animate down
            setTimeout(() => {
                coin.style.top = '90%';
            }, 50);
            
            // Check collision and remove
            const checkCollision = setInterval(() => {
                if (!coin.parentNode) {
                    clearInterval(checkCollision);
                    return;
                }
                
                const coinRect = coin.getBoundingClientRect();
                const player = document.getElementById(`collector-player-${gameId}`);
                const playerRect = player.getBoundingClientRect();
                
                if (coinRect.bottom >= playerRect.top && 
                    coinRect.top <= playerRect.bottom &&
                    coinRect.right >= playerRect.left && 
                    coinRect.left <= playerRect.right) {
                    
                    // Collision!
                    const state = window[`collectorState_${gameId}`];
                    state.score += 10;
                    updateCollectorScore(gameId);
                    coin.remove();
                    clearInterval(checkCollision);
                }
            }, 100);
            
            // Remove after animation
            setTimeout(() => {
                if (coin.parentNode) {
                    coin.remove();
                }
                clearInterval(checkCollision);
            }, 4000);
        }

        function moveCollector(gameId, direction) {
            const state = window[`collectorState_${gameId}`];
            const player = document.getElementById(`collector-player-${gameId}`);
            
            if (direction === 'left') {
                state.playerPos = Math.max(0, state.playerPos - 10);
            } else {
                state.playerPos = Math.min(90, state.playerPos + 10);
            }
            
            player.style.left = state.playerPos + '%';
        }

        function updateCollectorScore(gameId) {
            const state = window[`collectorState_${gameId}`];
            const status = document.getElementById(`collector-status-${gameId}`);
            if (status) status.textContent = `النقاط: ${state.score}`;
        }

        window.moveCollector = moveCollector;
        window.startCollectorGame = startCollectorGame;

        // Dress Up Game
        function getDressupGame(game) {
            return `
                <div class="game-header">
                    <h2>${game.title}</h2>
                    <p>${game.description}</p>
                </div>
                <div class="game-area">
                    <div style="text-align: center; margin: 20px 0;">
                        <div style="font-size: 8rem; margin: 20px 0;">👸</div>
                        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                            <button class="reset-btn" onclick="changeDress(${game.id}, '👗')">فستان احمر</button>
                            <button class="reset-btn" onclick="changeDress(${game.id}, '👑')">تاج</button>
                            <button class="reset-btn" onclick="changeDress(${game.id}, '👠')">حذاء</button>
                            <button class="reset-btn" onclick="changeDress(${game.id}, '👜')">حقيبة</button>
                            <button class="reset-btn" onclick="changeDress(${game.id}, 'reset')">ازالة الكل</button>
                        </div>
                        <div class="game-status" id="dressup-status-${game.id}" style="margin-top: 20px;"></div>
                    </div>
                </div>
            `;
        }

        function initDressupGame(gameId) {
            window[`dressupState_${gameId}`] = {
                items: []
            };
        }

        function changeDress(gameId, item) {
            const princess = document.querySelector(`#gameContainer .game-area div div[style*="font-size: 8rem"]`);
            
            if (item === 'reset') {
                princess.textContent = '👸';
                window[`dressupState_${gameId}`].items = [];
            } else {
                princess.textContent += ' ' + item;
                window[`dressupState_${gameId}`].items.push(item);
            }
            
            const status = document.getElementById(`dressup-status-${gameId}`);
            status.textContent = '✅ تمت الاضافة!';
        }

        window.changeDress = changeDress;

        // Animals Game
        function getAnimalsGame(game) {
            const animals = [
                { emoji: '🐶', name: 'كلب', sound: 'هوهو' },
                { emoji: '🐱', name: 'قط', sound: 'مياو' },
                { emoji: '🐮', name: 'بقرة', sound: 'مو' },
                { emoji: '🐔', name: 'دجاجة', sound: 'كو كو' }
            ];
            
            return `
                <div class="game-header">
                    <h2>${game.title}</h2>
                    <p>${game.description}</p>
                </div>
                <div class="game-area">
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin: 20px 0;">
                        ${animals.map(animal => `
                            <div style="text-align: center; cursor: pointer;" onclick="playAnimalSound('${animal.emoji}', '${animal.sound}', ${game.id})">
                                <div style="font-size: 5rem;">${animal.emoji}</div>
                                <div style="font-size: 1.2rem;">${animal.name}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="game-status" id="animals-status-${game.id}"></div>
                </div>
            `;
        }

        function initAnimalsGame(gameId) {
            // Nothing to initialize
        }

        function playAnimalSound(emoji, sound, gameId) {
            const status = document.getElementById(`animals-status-${gameId}`);
            status.textContent = `${emoji} يقول ${sound}!`;
            
            // Visual feedback
            setTimeout(() => {
                status.textContent = '';
            }, 2000);
        }

        window.playAnimalSound = playAnimalSound;

        // Default game for types not implemented
        function getDefaultGame(game) {
            return `
                <div class="game-header">
                    <h2>${game.title}</h2>
                    <p>${game.description}</p>
                </div>
                <div class="game-area">
                    <div style="text-align: center; padding: 50px;">
                        <i class="fas ${game.icon}" style="font-size: 8rem; color: #2a5298; margin-bottom: 20px;"></i>
                        <p style="font-size: 1.2rem; color: #666; margin-bottom: 20px;">قريباً...</p>
                        <button class="reset-btn" onclick="closeGame()">العودة للقائمة</button>
                    </div>
                </div>
            `;
        }

        // Close game
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameContainer').innerHTML = '';
        }

        window.closeGame = closeGame;

        // Filter by category
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category;
                displayGames();
            });
        });

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            currentGames = games.filter(game => 
                game.title.toLowerCase().includes(searchTerm) ||
                game.description.toLowerCase().includes(searchTerm)
            );
            displayGames();
        });

        // Initialize all games when modal opens
        document.getElementById('gameModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('gameModal')) {
                closeGame();
            }
        });

        // Display games on load
        displayGames();
        games.forEach(game => {
            const initFn = {
                memory: () => window[`initMemoryGame_${game.id}`] = initMemoryGame,
                tictactoe: () => window[`initTicTacToe_${game.id}`] = initTicTacToe,
                guess: () => window[`initGuessGame_${game.id}`] = initGuessGame,
                rps: () => window[`initRPS_${game.id}`] = initRPS,
                math: () => window[`initMathGame_${game.id}`] = initMathGame,
                reaction: () => window[`initReactionGame_${game.id}`] = initReactionGame,
                colors: () => window[`initColorsGame_${game.id}`] = initColorsGame,
                puzzle: () => window[`initPuzzleGame_${game.id}`] = initPuzzleGame,
                shooting: () => window[`initShootingGame_${game.id}`] = initShootingGame,
                collector: () => window[`initCollectorGame_${game.id}`] = initCollectorGame,
                dressup: () => window[`initDressupGame_${game.id}`] = initDressupGame,
                animals: () => window[`initAnimalsGame_${game.id}`] = initAnimalsGame
            }[game.type];
            
            if (initFn) {
                initFn();
            }
        });
    </script>
</body>
</html>
