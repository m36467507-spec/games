<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 صالون مودة ومريم للتجميل</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8e1e8, #fad0d9);
            min-height: 100vh;
            direction: rtl;
        }

        /* الهيدر */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(255, 105, 180, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            font-size: 40px;
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .logo-text h1 {
            color: #ff1493;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .logo-text p {
            color: #ff69b4;
            font-size: 14px;
        }

        .points-card {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3);
        }

        /* القائمة الرئيسية */
        .menu-section {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            color: #ff1493;
            font-size: 36px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.2);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            cursor: pointer;
            transition: 0.3s;
            border: 3px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #ff1493;
            box-shadow: 0 20px 40px rgba(255, 20, 147, 0.3);
        }

        .card-image {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 20px;
            color: white;
        }

        .card-overlay h3 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .card-content {
            padding: 20px;
        }

        .card-content p {
            color: #666;
            margin-bottom: 15px;
        }

        .card-points {
            display: inline-block;
            background: #ff1493;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
        }

        /* منطقة اللعبة */
        .game-section {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: #ff1493;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #ff1493;
            color: white;
            transform: scale(1.05);
        }

        .game-title {
            font-size: 32px;
            color: #ff1493;
        }

        .reset-btn {
            background: #ff1493;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3);
            transition: 0.2s;
        }

        .reset-btn:hover {
            transform: scale(1.05);
            background: #ff69b4;
        }

        /* صالون التجميل */
        .salon-container {
            background: white;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.2);
        }

        .model-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .model-card {
            text-align: center;
        }

        .model-title {
            color: #ff1493;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .model-display {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #fff0f5, #ffe4e1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            border: 3px solid white;
        }

        .tools-panel {
            background: #fff0f5;
            border-radius: 30px;
            padding: 30px;
            margin-top: 30px;
        }

        .tools-title {
            color: #ff1493;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
        }

        .tool-item {
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .tool-item:hover {
            border-color: #ff1493;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
        }

        .tool-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .tool-name {
            color: #ff1493;
            font-weight: bold;
            font-size: 14px;
        }

        .color-palette {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .color-swatch:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(255, 20, 147, 0.3);
        }

        .action-btn {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            box-shadow: 0 10px 20px rgba(255, 20, 147, 0.3);
            transition: 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 20, 147, 0.4);
        }

        .status-message {
            text-align: center;
            color: #ff1493;
            font-size: 20px;
            margin: 20px;
            padding: 15px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1);
        }

        /* ألعاب كلاسيكية */
        .classic-game {
            background: white;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.2);
        }

        .game-input {
            padding: 15px 25px;
            border: 3px solid #ff1493;
            border-radius: 50px;
            font-size: 18px;
            margin: 15px;
            width: 250px;
            outline: none;
        }

        .game-input:focus {
            box-shadow: 0 0 0 3px rgba(255, 20, 147, 0.3);
        }

        .choice-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .choice-btn {
            background: white;
            border: 3px solid #ff1493;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            color: #ff1493;
            cursor: pointer;
            transition: 0.2s;
            min-width: 120px;
        }

        .choice-btn:hover {
            background: #ff1493;
            color: white;
            transform: scale(1.05);
        }

        .tic-grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 15px;
            justify-content: center;
            margin: 30px auto;
        }

        .tic-cell {
            width: 120px;
            height: 120px;
            background: #fff0f5;
            border: 3px solid #ff1493;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: bold;
            color: #ff1493;
            cursor: pointer;
            transition: 0.2s;
        }

        .tic-cell:hover {
            background: #ff1493;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <span class="logo-icon">💄</span>
        <div class="logo-text">
            <h1>صالون مودة ومريم</h1>
            <p>أجمل ألعاب التجميل للبنوتات</p>
        </div>
    </div>
    <div class="points-card" id="points">
        💎 0 نقطة
    </div>
</header>

<!-- القائمة الرئيسية -->
<div id="menuSection" class="menu-section">
    <h2 class="section-title">🎀 اختاري لعبتك المفضلة 🎀</h2>
    <div class="games-grid" id="gamesGrid"></div>
</div>

<!-- منطقة اللعبة -->
<div id="gameSection" class="game-section" style="display: none;">
    <div class="game-header">
        <button class="back-btn" onclick="backToMenu()">
            <span>🔙</span> رجوع
        </button>
        <h2 class="game-title" id="currentGameTitle"></h2>
        <button class="reset-btn" onclick="resetCurrentGame()">
            <span>🔄</span> لعبة جديدة
        </button>
    </div>
    <div id="gameContent"></div>
</div>

<script>
///////////////////////////////////////////
// نظام النقاط
///////////////////////////////////////////
let points = parseInt(localStorage.getItem('points')) || 0;
updatePointsDisplay();

function updatePointsDisplay() {
    document.getElementById('points').innerHTML = `💎 ${points} نقطة`;
}

function addPoints(p) {
    points += p;
    localStorage.setItem('points', points);
    updatePointsDisplay();
    
    // رسالة منبثقة لطيفة
    const message = document.createElement('div');
    message.style.cssText = `
        position: fixed;
        top: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(135deg, #ff1493, #ff69b4);
        color: white;
        padding: 15px 40px;
        border-radius: 50px;
        font-size: 20px;
        font-weight: bold;
        z-index: 1000;
        box-shadow: 0 10px 30px rgba(255,20,147,0.3);
        animation: slideDown 0.5s ease;
    `;
    message.innerHTML = `🎀 +${p} نقطة!`;
    document.body.appendChild(message);
    
    setTimeout(() => {
        message.style.animation = 'slideUp 0.5s ease';
        setTimeout(() => message.remove(), 500);
    }, 2000);
}

///////////////////////////////////////////
// الألعاب - تصميم واقعي
///////////////////////////////////////////
const games = [
    {
        id: 1,
        name: 'صالون الشعر',
        icon: '💇',
        description: 'قصفي وصبغي شعرك بتسريحات عصرية',
        points: '5-10 نقاط',
        image: 'https://cdn-icons-png.flaticon.com/512/2917/2917996.png',
        bgColor: '#FFB6C1'
    },
    {
        id: 2,
        name: 'مانيكير الأظافر',
        icon: '💅',
        description: 'تزيين الأظافر بأجمل الألوان',
        points: '3-8 نقاط',
        image: 'https://cdn-icons-png.flaticon.com/512/2917/2917980.png',
        bgColor: '#FFC0CB'
    },
    {
        id: 3,
        name: 'فساتين الأميرات',
        icon: '👗',
        description: 'تصميم فساتين ساحرة للأميرات',
        points: '7-15 نقاط',
        image: 'https://cdn-icons-png.flaticon.com/512/2917/2917994.png',
        bgColor: '#DDA0DD'
    },
    {
        id: 4,
        name: 'مكياج احترافي',
        icon: '👁️',
        description: 'تطبيق أجمل مكياج للعيون',
        points: '6-12 نقاط',
        image: 'https://cdn-icons-png.flaticon.com/512/2917/2917985.png',
        bgColor: '#E6E6FA'
    },
    {
        id: 5,
        name: 'تزيين الكعكات',
        icon: '🍰',
        description: 'ديكورات كعكات عيد الميلاد',
        points: '8-15 نقاط',
        image: 'https://cdn-icons-png.flaticon.com/512/2917/2917992.png',
        bgColor: '#FFE4E1'
    },
    {
        id: 6,
        name: 'مجوهرات فاخرة',
        icon: '💎',
        description: 'تصميم إكسسوارات براقة',
        points: '6-10 نقاط',
        image: 'https://cdn-icons-png.flaticon.com/512/2917/2917988.png',
        bgColor: '#F0E68C'
    },
    {
        id: 7,
        name: 'لعبة إكس-أو',
        icon: '❌⭕',
        description: 'لعبة كلاسيكية ضد الكمبيوتر',
        points: '5 نقاط',
        image: 'https://cdn-icons-png.flaticon.com/512/2917/2917975.png',
        bgColor: '#B0E0E6'
    },
    {
        id: 8,
        name: 'مقهى الحلوى',
        icon: '🧁',
        description: 'تحضير أشهى الحلويات',
        points: '10-20 نقاط',
        image: 'https://cdn-icons-png.flaticon.com/512/2917/2917983.png',
        bgColor: '#F0FFF0'
    }
];

// عرض الألعاب
function displayGames() {
    let html = '';
    games.forEach(game => {
        html += `
            <div class="game-card" onclick="playGame(${game.id})">
                <div class="card-image" style="background-image: url('${game.image}'); background-color: ${game.bgColor};">
                    <div class="card-overlay">
                        <h3>${game.name}</h3>
                    </div>
                </div>
                <div class="card-content">
                    <p>${game.description}</p>
                    <span class="card-points">🏆 ${game.points}</span>
                </div>
            </div>
        `;
    });
    document.getElementById('gamesGrid').innerHTML = html;
}

// التنقل
function backToMenu() {
    document.getElementById('menuSection').style.display = 'block';
    document.getElementById('gameSection').style.display = 'none';
}

function playGame(id) {
    document.getElementById('menuSection').style.display = 'none';
    document.getElementById('gameSection').style.display = 'block';
    
    const game = games.find(g => g.id === id);
    document.getElementById('currentGameTitle').innerHTML = game.name;
    
    let content = '';
    
    switch(id) {
        case 1: content = hairSalonGame(); break;
        case 2: content = nailsGame(); break;
        case 3: content = dressGame(); break;
        case 4: content = makeupGame(); break;
        case 5: content = cakeGame(); break;
        case 6: content = jewelryGame(); break;
        case 7: content = ticTacToeGame(); break;
        case 8: content = candyGame(); break;
    }
    
    document.getElementById('gameContent').innerHTML = content;
}

function resetCurrentGame() {
    const title = document.getElementById('currentGameTitle').innerHTML;
    const game = games.find(g => g.name === title);
    if(game) playGame(game.id);
}

///////////////////////////////////////////
// صالون الشعر (واقعي)
///////////////////////////////////////////
function hairSalonGame() {
    return `
        <div class="salon-container">
            <div class="model-container">
                <div class="model-card">
                    <div class="model-title">قبل</div>
                    <div class="model-display" id="beforeHair">👧</div>
                </div>
                <div class="model-card">
                    <div class="model-title">بعد</div>
                    <div class="model-display" id="afterHair">👩‍🦰</div>
                </div>
            </div>
            
            <div class="tools-panel">
                <h3 class="tools-title">أدوات التصفيف</h3>
                <div class="tools-grid">
                    <div class="tool-item" onclick="applyHairTool('💇', 'قص')">
                        <div class="tool-icon">💇</div>
                        <div class="tool-name">قص الشعر</div>
                    </div>
                    <div class="tool-item" onclick="applyHairTool('👩‍🦰', 'تمليس')">
                        <div class="tool-icon">👩‍🦰</div>
                        <div class="tool-name">تمليس</div>
                    </div>
                    <div class="tool-item" onclick="applyHairTool('👩‍🦱', 'تجعيد')">
                        <div class="tool-icon">👩‍🦱</div>
                        <div class="tool-name">تجعيد</div>
                    </div>
                    <div class="tool-item" onclick="applyHairTool('👸', 'تاج')">
                        <div class="tool-icon">👸</div>
                        <div class="tool-name">تاج أميرة</div>
                    </div>
                </div>
                
                <h3 class="tools-title" style="margin-top: 30px;">ألوان الصبغة</h3>
                <div class="color-palette">
                    <div class="color-swatch" style="background: #000000;" onclick="applyHairColor('#000000')"></div>
                    <div class="color-swatch" style="background: #8B4513;" onclick="applyHairColor('#8B4513')"></div>
                    <div class="color-swatch" style="background: #FFD700;" onclick="applyHairColor('#FFD700')"></div>
                    <div class="color-swatch" style="background: #FF69B4;" onclick="applyHairColor('#FF69B4')"></div>
                    <div class="color-swatch" style="background: #FF4500;" onclick="applyHairColor('#FF4500')"></div>
                </div>
            </div>
            
            <div class="status-message" id="hairStatus">⚡ اختاري تسريحة وألوان</div>
            <button class="action-btn" onclick="saveHairStyle()">✨ حفظ التسريحة ✨</button>
        </div>
        <script>
            window.applyHairTool = function(tool, name) {
                document.getElementById('afterHair').innerHTML = tool;
                document.getElementById('hairStatus').innerHTML = '🎀 تم تطبيق: ' + name;
            };
            
            window.applyHairColor = function(color) {
                document.getElementById('afterHair').style.color = color;
                document.getElementById('hairStatus').innerHTML = '💗 لون رائع!';
            };
            
            window.saveHairStyle = function() {
                const points = Math.floor(Math.random() * 6) + 5;
                document.getElementById('hairStatus').innerHTML = '🎉 تسريحة رائعة! +' + points + ' نقاط';
                addPoints(points);
            };
        <\/script>
    `;
}

///////////////////////////////////////////
// مانيكير الأظافر
///////////////////////////////////////////
function nailsGame() {
    return `
        <div class="salon-container">
            <div class="model-container">
                <div class="model-card">
                    <div class="model-title">أظافرك</div>
                    <div class="model-display" id="nails">🖐️</div>
                </div>
            </div>
            
            <div class="tools-panel">
                <h3 class="tools-title">ألوان الطلاء</h3>
                <div class="color-palette">
                    <div class="color-swatch" style="background: #FF1493;" onclick="applyNailColor('#FF1493')"></div>
                    <div class="color-swatch" style="background: #FF0000;" onclick="applyNailColor('#FF0000')"></div>
                    <div class="color-swatch" style="background: #FF69B4;" onclick="applyNailColor('#FF69B4')"></div>
                    <div class="color-swatch" style="background: #9370DB;" onclick="applyNailColor('#9370DB')"></div>
                    <div class="color-swatch" style="background: #4169E1;" onclick="applyNailColor('#4169E1')"></div>
                </div>
                
                <h3 class="tools-title" style="margin-top: 30px;">إكسسوارات</h3>
                <div class="tools-grid">
                    <div class="tool-item" onclick="applyNailSticker('⭐')">
                        <div class="tool-icon">⭐</div>
                        <div class="tool-name">نجمة</div>
                    </div>
                    <div class="tool-item" onclick="applyNailSticker('❤️')">
                        <div class="tool-icon">❤️</div>
                        <div class="tool-name">قلب</div>
                    </div>
                    <div class="tool-item" onclick="applyNailSticker('💎')">
                        <div class="tool-icon">💎</div>
                        <div class="tool-name">كريستال</div>
                    </div>
                </div>
            </div>
            
            <div class="status-message" id="nailsStatus">💅 اختاري لون رائع</div>
            <button class="action-btn" onclick="saveNails()">✨ حفظ التصميم ✨</button>
        </div>
        <script>
            window.applyNailColor = function(color) {
                document.getElementById('nails').style.color = color;
                document.getElementById('nailsStatus').innerHTML = 'لون جميل!';
            };
            
            window.applyNailSticker = function(sticker) {
                document.getElementById('nails').innerHTML = '🖐️' + sticker;
                document.getElementById('nailsStatus').innerHTML = 'إضافة ' + sticker;
            };
            
            window.saveNails = function() {
                const points = Math.floor(Math.random() * 6) + 3;
                document.getElementById('nailsStatus').innerHTML = '💅 أظافر رائعة! +' + points + ' نقاط';
                addPoints(points);
            };
        <\/script>
    `;
}

///////////////////////////////////////////
// فساتين الأميرات
///////////////////////////////////////////
function dressGame() {
    return `
        <div class="salon-container">
            <div class="model-container">
                <div class="model-card">
                    <div class="model-display" id="princess">👸</div>
                </div>
            </div>
            
            <div class="tools-panel">
                <h3 class="tools-title">فساتين ساحرة</h3>
                <div class="tools-grid">

///////////////////////////////////////////
// لعبة إكس-أو
///////////////////////////////////////////
function ticTacToeGame() {
    return `
        <div class="classic-game">
            <h2 style="color: #ff1493; margin-bottom: 20px;">❌⭕ إكس-أو</h2>
            <div class="tic-grid" id="ticGrid"></div>
            <div class="status-message" id="ticStatus">دورك</div>
        </div>
        <script>
            let ticBoard = ['','','','','','','','',''];
            let ticTurn = 'X';
            let ticGameOver = false;
            
            function renderTic() {
                let html = '';
                for(let i = 0; i < 9; i++) {
                    html += '<div class="tic-cell" onclick="window.ticMove('+i+')">'+ticBoard[i]+'</div>';
                }
                document.getElementById('ticGrid').innerHTML = html;
            }
            
            window.ticMove = function(i) {
                if(ticGameOver || ticBoard[i] !== '') return;
                ticBoard[i] = 'X';
                renderTic();
                if(!checkTicWin()) {
                    setTimeout(window.ticAIMove, 500);
                }
            };
            
            window.ticAIMove = function() {
                let empty = [];
                for(let i = 0; i < 9; i++) if(ticBoard[i] === '') empty.push(i);
                if(empty.length > 0) {
                    ticBoard[empty[Math.floor(Math.random() * empty.length)]] = 'O';
                    renderTic();
                    checkTicWin();
                }
            };
            
            function checkTicWin() {
                let wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for(let w of wins) {
                    if(ticBoard[w[0]] && ticBoard[w[0]] === ticBoard[w[1]] && ticBoard[w[0]] === ticBoard[w[2]]) {
                        ticGameOver = true;
                        if(ticBoard[w[0]] === 'X') {
                            document.getElementById('ticStatus').innerHTML = '🎉 فزتي! +5 نقاط';
                            addPoints(5);
                        } else {
                            document.getElementById('ticStatus').innerHTML = 'الكمبيوتر فاز';
                        }
                        return true;
                    }
                }
                if(!ticBoard.includes('')) {
                    ticGameOver = true;
                    document.getElementById('ticStatus').innerHTML = 'تعادل';
                    return true;
                }
                return false;
            }
            
            renderTic();
        <\/script>
    `;
}
