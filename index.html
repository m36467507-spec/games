<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 ألعاب مودة ومريم - بناتي</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffc0cb, #ffb6c1);
            color: #4a2c2c;
            direction: rtl;
            padding: 20px;
            min-height: 100vh;
        }

        /* خلفية باسمائكم */
        body::before {
            content: "❤️ مودة ومريم ❤️";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 100px;
            color: rgba(255, 105, 180, 0.1);
            z-index: -1;
            white-space: nowrap;
            pointer-events: none;
        }

        /* الهيدر */
        header {
            background: #ff69b4;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid white;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: 30px;
            font-weight: bold;
            color: white;
        }

        .points-box {
            background: white;
            color: #ff69b4;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 20px;
        }

        /* الأزرار */
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: white;
            color: #ff69b4;
            border: 2px solid #ff69b4;
            transition: 0.2s;
        }

        button:hover {
            background: #ff69b4;
            color: white;
            transform: scale(1.05);
        }

        /* شبكة الألعاب */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .game-card {
            background: white;
            border: 2px solid #ff69b4;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            background: #ffe4e1;
            box-shadow: 0 0 20px #ff69b4;
        }

        .game-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .game-title {
            font-size: 14px;
            font-weight: bold;
            color: #ff69b4;
        }

        /* منطقة اللعبة */
        .game-area {
            background: white;
            border: 3px solid #ff69b4;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            min-height: 400px;
        }

        /* ألعاب البنات */
        .doll-container {
            position: relative;
            width: 300px;
            height: 400px;
            margin: 20px auto;
        }

        .doll-part {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .style-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .style-item {
            width: 80px;
            height: 80px;
            background: #ffe4e1;
            border: 2px solid #ff69b4;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 30px;
        }

        .style-item:hover {
            background: #ff69b4;
            color: white;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .color-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
        }

        .color-circle:hover {
            transform: scale(1.1);
        }

        .nail {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            margin: 5px;
            display: inline-block;
            cursor: pointer;
        }

        .outfit-part {
            font-size: 60px;
            margin: 10px;
            cursor: pointer;
        }

        .status {
            font-size: 20px;
            margin: 20px;
            color: #ff69b4;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🎀 مودة ومريم ستايل 🎀</div>
    <div class="points-box" id="points">0</div>
</header>

<!-- القائمة الرئيسية -->
<div id="menu" style="display: block;">
    <h2 style="text-align: center; color: white; margin: 20px;">🎀 ألعاب البنات الحلوة 🎀</h2>
    <div class="games-grid" id="gamesGrid"></div>
</div>

<!-- منطقة عرض اللعبة -->
<div id="gameContainer" style="display: none;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <button onclick="backToMenu()">🔙 رجوع</button>
        <h2 id="gameTitle" style="color: white;"></h2>
        <button onclick="resetCurrentGame()">🔄 إعادة</button>
    </div>
    <div id="gameContent" class="game-area"></div>
</div>

<script>
///////////////////////////////////////////
// نظام النقاط
///////////////////////////////////////////
let points = parseInt(localStorage.getItem('points')) || 0;
document.getElementById('points').textContent = points;

function addPoints(p) {
    points += p;
    localStorage.setItem('points', points);
    document.getElementById('points').textContent = points;
    alert(`🎀 +${p} نقطة! المجموع: ${points}`);
}

///////////////////////////////////////////
// 35 لعبة (27 قديمة + 8 ألعاب بنات)
///////////////////////////////////////////
const games = [
    // الألعاب القديمة
    { id: 1, name: 'إكس-أو', icon: '❌⭕' },
    { id: 2, name: 'الذاكرة', icon: '🎴' },
    { id: 3, name: 'تخمين الأرقام', icon: '🔢' },
    { id: 4, name: 'حجر ورقة مقص', icon: '✂️' },
    { id: 5, name: 'عملة معدنية', icon: '🪙' },
    { id: 6, name: 'الجمع السريع', icon: '➕' },
    { id: 7, name: 'الطرح السريع', icon: '➖' },
    { id: 8, name: 'جدول الضرب', icon: '✖️' },
    { id: 9, name: 'القسمة', icon: '➗' },
    { id: 10, name: 'الأكبر والأصغر', icon: '📊' },
    { id: 11, name: 'تسلسل الأرقام', icon: '📈' },
    { id: 12, name: 'الرقم المفقود', icon: '🔍' },
    { id: 13, name: 'العد التنازلي', icon: '⏱️' },
    { id: 14, name: 'مضاعفات الرقم', icon: '🔄' },
    { id: 15, name: 'تحليل الرقم', icon: '🔬' },
    { id: 16, name: 'الحرف الناقص', icon: '📝' },
    { id: 17, name: 'ترتيب الحروف', icon: '🔤' },
    { id: 18, name: 'كلمة السر', icon: '🔐' },
    { id: 19, name: 'عكس الكلمة', icon: '🔄' },
    { id: 20, name: 'أطول كلمة', icon: '📏' },
    { id: 21, name: 'الزوجي والفردي', icon: '2️⃣' },
    { id: 22, name: 'مربع العدد', icon: '■' },

    { id: 24, name: 'النسبة المئوية', icon: '%' },
    { id: 25, name: 'الكسور', icon: '½' },
    { id: 26, name: 'الأعداد العشرية', icon: '🔟' },
    { id: 27, name: 'الأعداد السالبة', icon: '➖' },
    
    // ألعاب بنات جديدة
    { id: 28, name: 'تسريحة شعر', icon: '💇' },
    { id: 29, name: 'تلوين أظافر', icon: '💅' },
    { id: 30, name: 'فستان أميرة', icon: '👗' },
    { id: 31, name: 'مكياج عيون', icon: '👁️' },
    { id: 32, name: 'تزيين كعكة', icon: '🍰' },
    { id: 33, name: 'غرفة بنات', icon: '🛏️' },

// عرض الألعاب في القائمة
function displayGames() {
    let html = '';
    games.forEach(game => {
        html += `
            <div class="game-card" onclick="playGame(${game.id})">

                <div class="game-title">${game.name}</div>

// العودة للقائمة
function backToMenu() {
    document.getElementById('menu').style.display = 'block';
    document.getElementById('gameContainer').style.display = 'none';
}

// تشغيل لعبة معينة
function playGame(id) {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameContainer').style.display = 'block';
    
    let game = games.find(g => g.id === id);
    document.getElementById('gameTitle').textContent = game.name;
    
    let content = '';

        // الألعاب القديمة

            case 1: content = ticTacToeGame(); break;

            case 14: content = multiplesGame(); break;
            case 15: content = factorsGame(); break;
            case 16: content = missingLetterGame(); break;
            case 17: content = arrangeLettersGame(); break;
            case 18: content = passwordGame(); break;
            case 19: content = reverseWordGame(); break;
            case 20: content = longestWordGame(); break;
            case 21: content = oddEvenGame(); break;
            case 22: content = squareGame(); break;
            case 23: content = sqrtGame(); break;

            case 27: content = negativeGame(); break;

    } else {

        switch(id) {
            case 28: content = hairGame(); break;
            case 29: content = nailsGame(); break;
            case 30: content = dressGame(); break;
            case 31: content = makeupGame(); break;
            case 32: content = cakeGame(); break;
            case 33: content = roomGame(); break;
            case 34: content = petsGame(); break;

// إعادة تشغيل اللعبة الحالية
function resetCurrentGame() {
    let title = document.getElementById('gameTitle').textContent;
    let game = games.find(g => g.name === title);
    if (game) playGame(game.id);
}

///////////////////////////////////////////
// الألعاب القديمة (موجودة)
///////////////////////////////////////////

// 1. إكس-أو
function ticTacToeGame() {
    return `
        <div style="text-align: center;">
            <div class="tic-grid" id="ticGrid"></div>
            <div class="status" id="ticStatus">دورك يا بطل</div>
        </div>
        <script>
            let ticBoard = ['','','','','','','','',''];
            let ticTurn = 'X';
            let ticGameOver = false;
            
            function renderTic() {
                let html = '';
                for(let i = 0; i < 9; i++) {
                    html += '<div class="tic-cell" onclick="window.ticMove('+i+')">'+ticBoard[i]+'</div>';
                }
                document.getElementById('ticGrid').innerHTML = html;
            }
            
            window.ticMove = function(i) {
                if(ticGameOver || ticBoard[i] !== '') return;
                ticBoard[i] = 'X';
                renderTic();
                if(!checkTicWin()) {
                    setTimeout(window.ticAIMove, 500);
                }
            };
            
            window.ticAIMove = function() {
                let empty = [];
                for(let i = 0; i < 9; i++) if(ticBoard[i] === '') empty.push(i);
                if(empty.length > 0) {
                    ticBoard[empty[Math.floor(Math.random() * empty.length)]] = 'O';
                    renderTic();
                    checkTicWin();
                }
            };
            
            function checkTicWin() {
                let wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for(let w of wins) {
                    if(ticBoard[w[0]] && ticBoard[w[0]] === ticBoard[w[1]] && ticBoard[w[0]] === ticBoard[w[2]]) {
                        ticGameOver = true;
                        if(ticBoard[w[0]] === 'X') {
                            document.getElementById('ticStatus').innerHTML = '🎉 فزت! +5 نقاط';
                            addPoints(5);
                        } else {
                            document.getElementById('ticStatus').innerHTML = 'خسرت';
                        }
                        return true;
                    }
                }
                if(!ticBoard.includes('')) {
                    ticGameOver = true;
                    document.getElementById('ticStatus').innerHTML = 'تعادل';
                    return true;
                }
                return false;
            }
            
            renderTic();
        <\/script>
    `;
}

// 2. الذاكرة
function memoryGame() {
    return `
        <div style="text-align: center;">
            <div class="memory-grid" id="memoryGrid"></div>
            <div class="status">المحاولات: <span id="memoryMoves">0</span></div>
        </div>
        <script>
            let memCards = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];
            memCards = [...memCards, ...memCards].sort(() => Math.random() - 0.5);
            let memFlipped = new Array(16).fill(false);
            let memMatched = new Array(16).fill(false);
            let memMoves = 0;
            let memLock = false;
            
            function renderMemory() {
                let html = '';
                for(let i = 0; i < 16; i++) {
                    let cls = 'memory-card';
                    if(memFlipped[i] || memMatched[i]) cls += ' flipped';
                    html += '<div class="'+cls+'" onclick="window.memoryFlip('+i+')">';
                    html += memFlipped[i] || memMatched[i] ? memCards[i] : '❓';
                    html += '</div>';
                    if((i+1) % 4 === 0) html += '<br>';
                }
                document.getElementById('memoryGrid').innerHTML = html;
            }
            
            window.memoryFlip = function(i) {
                if(memLock || memMatched[i] || memFlipped[i]) return;
                
                memFlipped[i] = true;
                renderMemory();
                
                let flipped = [];
                for(let j = 0; j < 16; j++) if(memFlipped[j] && !memMatched[j]) flipped.push(j);
                
                if(flipped.length === 2) {
                    memLock = true;
                    memMoves++;
                    document.getElementById('memoryMoves').textContent = memMoves;
                    
                    if(memCards[flipped[0]] === memCards[flipped[1]]) {
                        memMatched[flipped[0]] = memMatched[flipped[1]] = true;
                        memFlipped[flipped[0]] = memFlipped[flipped[1]] = false;
                        memLock = false;
                        renderMemory();
                        
                        if(memMatched.every(v => v)) {
                            alert('🎉 فزت! +10 نقاط');
                            addPoints(10);
                        }
                    } else {
                        setTimeout(() => {
                            memFlipped[flipped[0]] = memFlipped[flipped[1]] = false;
                            memLock = false;
                            renderMemory();
                        }, 1000);
                    }
                }
            };
            
            renderMemory();
        <\/script>
    `;
}

// 3. تخمين الأرقام
function guessNumberGame() {
    let secret = Math.floor(Math.random() * 100) + 1;
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">خمن الرقم من 1 ل 100</h3>
            <input type="number" id="guessInput" placeholder="تخمينك">
            <button onclick="window.checkGuess(${secret})">تحقق</button>
            <div class="status" id="guessStatus"></div>
        </div>
        <script>
            window.checkGuess = function(s) {
                let g = parseInt(document.getElementById('guessInput').value);
                let status = document.getElementById('guessStatus');
                if(g === s) {
                    status.innerHTML = '🎉 صح! +5 نقاط';
                    addPoints(5);
                } else if(g < s) {
                    status.innerHTML = 'الرقم أكبر';
                } else {
                    status.innerHTML = 'الرقم أصغر';
                }
            };
        <\/script>
    `;
}

// 4. حجر ورقة مقص
function rpsGame() {
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">اختار:</h3>
            <button onclick="window.playRPS('حجر')">🪨 حجر</button>
            <button onclick="window.playRPS('ورقة')">📄 ورقة</button>
            <button onclick="window.playRPS('مقص')">✂️ مقص</button>
            <div class="status" id="rpsStatus"></div>
        </div>
        <script>
            window.playRPS = function(player) {
                let choices = ['حجر','ورقة','مقص'];
                let computer = choices[Math.floor(Math.random() * 3)];
                let result = '';
                
                if(player === computer) result = 'تعادل';
                else if(
                    (player === 'حجر' && computer === 'مقص') ||
                    (player === 'ورقة' && computer === 'حجر') ||
                    (player === 'مقص' && computer === 'ورقة')
                ) {
                    result = '🎉 فزت! +3 نقاط';
                    addPoints(3);
                } else {
                    result = 'خسرت';
                }
                
                document.getElementById('rpsStatus').innerHTML = 
                    'اخترت: ' + player + ' - الكمبيوتر: ' + computer + '<br>' + result;
            };
        <\/script>
    `;
}

// 5. عملة معدنية

        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">اختر:</h3>
            <button onclick="window.playCoin('صورة')">👤 صورة</button>

            <div class="status" id="coinStatus"></div>
        </div>
        <script>
            window.playCoin = function(player) {
                let coin = Math.random() < 0.5 ? 'صورة' : 'كتابة';
                let result = coin === player ? '🎉 فزت! +2 نقاط' : 'خسرت';
                if(coin === player) addPoints(2);
                document.getElementById('coinStatus').innerHTML = 
                    'النتيجة: ' + coin + '<br>' + result;
            };

    `;
}

// 10. الأكبر والأصغر
function compareGame() {
    let a = Math.floor(Math.random() * 50) + 1;
    let b = Math.floor(Math.random() * 50) + 1;
    return `
