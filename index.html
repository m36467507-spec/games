<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 ألعاب مميزة - العب واستمتع</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            min-height: 100vh;
        }

        /* Header */
        header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #141e30, #243b55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            background: linear-gradient(135deg, #141e30, #243b55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-counter {
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            color: white;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.3rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
        }

        .game-card:hover {
            transform: translateY(-10px) rotateX(2deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .game-image {
            height: 200px;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .game-image::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            transform: rotate(45deg) translateY(100%);
            transition: transform 0.6s;
        }

        .game-card:hover .game-image::before {
            transform: rotate(45deg) translateY(-100%);
        }

        .game-image i {
            font-size: 5rem;
            color: white;
            z-index: 1;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
            transition: all 0.3s;
        }

        .game-card:hover .game-image i {
            transform: scale(1.1) rotate(5deg);
        }

        .game-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ff4757;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            z-index: 2;
            box-shadow: 0 3px 10px rgba(255,71,87,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .game-age {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            z-index: 2;
            backdrop-filter: blur(5px);
        }

        .game-info {
            padding: 1.5rem;
        }

        .game-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-rating {
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: #fef3c7;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.9rem;
        }

        .game-category {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: #e2e8f0;
            border-radius: 50px;
            font-size: 0.8rem;
            color: #475569;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .game-description {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .game-features {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            color: #475569;
            font-size: 0.9rem;
        }

        .game-features span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .play-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .play-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(20,30,48,0.4);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            position: relative;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .close-modal {
            position: fixed;
            top: 1rem;
            left: 1rem;
            width: 50px;
            height: 50px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(239,68,68,0.4);
        }

        .close-modal:hover {
            transform: rotate(90deg) scale(1.1);
            background: #dc2626;
        }

        .game-wrapper {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid transparent;
            border-image: linear-gradient(135deg, #141e30, #243b55);
            border-image-slice: 1;
        }

        .game-header h2 {
            font-size: 2.5rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        /* Game Canvas */
        .game-canvas {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 4px solid #141e30;
        }

        /* Game Elements */
        .player {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(251,191,36,0.5);
        }

        .enemy {
            position: absolute;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            animation: fall 3s linear;
        }

        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background: gold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            animation: fall 4s linear;
        }

        .target {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #fff;
            border: 3px solid #ef4444;
            border-radius: 50%;
            cursor: pointer;
            animation: move 3s infinite alternate;
        }

        @keyframes fall {
            from { top: -50px; }
            to { top: 100%; }
        }

        @keyframes move {
            from { left: 0; }
            to { left: 90%; }
        }

        /* Game Controls */
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            border: 2px solid transparent;
        }

        .control-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(20,30,48,0.4);
            border-color: #fbbf24;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .game-status {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 1rem 0;
            padding: 1rem;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Memory Game Grid */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 20px;
            height: 100%;
        }

        .memory-card {
            background: linear-gradient(135deg, #141e30, #243b55);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .memory-card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .memory-card.flipped {
            background: white;
            color: #141e30;
            transform: rotateY(180deg);
        }

        .memory-card.matched {
            background: #10b981;
            color: white;
            cursor: default;
            animation: match 0.5s;
        }

        @keyframes match {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Tic Tac Toe */
        .ttt-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
            height: 100%;
        }

        .ttt-cell {
            background: linear-gradient(135deg, #141e30, #243b55);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ttt-cell:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        .ttt-cell.win {
            background: #10b981;
            animation: win 1s infinite;
        }

        @keyframes win {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Snake Game */
        .snake-grid {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 1px;
            background: #1e293b;
            padding: 1px;
            height: 100%;
        }

        .snake-cell {
            aspect-ratio: 1;
            background: #0f172a;
        }

        .snake-cell.snake {
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 5px;
            box-shadow: 0 0 10px #10b981;
        }

        .snake-cell.food {
            background: gold;
            border-radius: 50%;
            box-shadow: 0 0 15px gold;
            animation: pulse 1s infinite;
        }

        /* Loading */
        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1002;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #141e30;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: white;
            opacity: 0.8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            
            .hero p {
                font-size: 1rem;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
            
            .game-header h2 {
                font-size: 1.8rem;
            }
            
            .game-canvas {
                height: 300px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-gamepad"></i>
                    <span>10 ألعاب مميزة</span>
                </div>
                <div class="game-counter">

                    10 ألعاب حصرية

    <section class="hero">

        <p>ألعاب مبتكرة وممتعة تناسب جميع الأعمار - العب واستمتع بتجربة فريدة</p>

    <div class="games-grid" id="gamesGrid"></div>

    <div class="modal" id="gameModal">

    <footer>
        <p>© 2024 - 10 ألعاب مميزة | العب واستمتع بأحدث الألعاب</p>
    </footer>

    <script>
        // ==================== GAME DATABASE ====================
        const games = [
            {

                rating: 4.8,
                players: "1",

                type: "pilot"
            }
        ];

        // ==================== DISPLAY GAMES ====================
        function displayGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = games.map(game => `
                <div class="game-card" onclick="openGame(${game.id})">
                    <div class="game-image">
                        <i class="fas ${game.icon}"></i>
                        <span class="game-badge">${game.rating} ⭐</span>
                        <span class="game-age">${game.age}</span>
                    </div>
                    <div class="game-info">
                        <div class="game-title">
                            <span>${game.title}</span>
                            <span class="game-rating"><i class="fas fa-star"></i> ${game.rating}</span>
                        </div>
                        <span class="game-category">${game.category}</span>
                        <p class="game-description">${game.description}</p>
                        <div class="game-features">
                            <span><i class="fas fa-user"></i> ${game.players}</span>
                            <span><i class="fas fa-clock"></i> ${game.time}</span>
                            ${game.features.map(f => `<span><i class="fas fa-check-circle"></i> ${f}</span>`).join('')}
                        </div>
                        <button class="play-btn" onclick="event.stopPropagation(); openGame(${game.id})">
                            <i class="fas fa-play"></i> العب الان
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ==================== OPEN GAME ====================
        function openGame(gameId) {
            const game = games.find(g => g.id === gameId);
            const wrapper = document.getElementById('gameWrapper');
            
            document.getElementById('loading').style.display = 'block';
            
            setTimeout(() => {
                let gameHTML = '';
                
                switch(game.type) {
                    case 'collector':
                        gameHTML = createCollectorGame(game);
                        break;
                    case 'memory':
                        gameHTML = createMemoryGame(game);
                        break;
                    case 'tictactoe':
                        gameHTML = createTicTacToeGame(game);
                        break;
                    case 'snake':
                        gameHTML = createSnakeGame(game);
                        break;
                    case 'shooter':
                        gameHTML = createShooterGame(game);
                        break;
                    case 'rps':
                        gameHTML = createRPSGame(game);
                        break;
                    case 'math':
                        gameHTML = createMathGame(game);
                        break;
                    case 'colors':
                        gameHTML = createColorsGame(game);
                        break;
                    case 'puzzle':

        // 2. Memory Game
        function initMemoryGame() {
            const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
            memoryCards = [...emojis, ...emojis];
            memoryCards.sort(() => Math.random() - 0.5);
            memoryFlipped = [];
            memoryMatched = [];
            memoryMoves = 0;
            
            const grid = document.getElementById('memoryGrid');
            if (!grid) return;
            
            grid.innerHTML = memoryCards.map((emoji, index) => `
                <div class="memory-card" data-index="${index}" data-emoji="${emoji}" onclick="flipCard(${index})">
                    ❓
                </div>
            `).join('');
            
            updateMemoryStatus();
        }

        function flipCard(index) {
            if (memoryFlipped.length === 2) return;
            if (memoryMatched.includes(index)) return;
            if (memoryFlipped.includes(index)) return;
            
            const card = document.querySelector(`.memory-card[data-index="${index}"]`);
            card.classList.add('flipped');
            card.innerHTML = card.dataset.emoji;
            
            memoryFlipped.push(index);
            
            if (memoryFlipped.length === 2) {
                memoryMoves++;
                const [i1, i2] = memoryFlipped;
                const card1 = memoryCards[i1];
                const card2 = memoryCards[i2];
                
                if (card1 === card2) {
                    memoryMatched.push(i1, i2);
                    document.querySelectorAll(`.memory-card[data-index="${i1}"], .memory-card[data-index="${i2}"]`).forEach(c => {
                        c.classList.add('matched');
                    });
                    memoryFlipped = [];
                } else {
                    setTimeout(() => {
                        document.querySelectorAll('.memory-card.flipped').forEach(c => {
                            c.classList.remove('flipped');
                            c.innerHTML = '❓';
                        });
                        memoryFlipped = [];
                    }, 1000);
                }
                
                updateMemoryStatus();
                
                if (memoryMatched.length === 16) {
                    setTimeout(() => {
                        alert('🎉 تهانينا! لقد فزت!');
                    }, 500);
                }
            }
        }

        function updateMemoryStatus() {
            const status = document.getElementById('gameStatus');
            if (status) {
                const remaining = 8 - (memoryMatched.length / 2);
                status.innerHTML = `عدد المحاولات: ${memoryMoves} | المتبقي: ${remaining}`;
            }
        }

        function resetMemoryGame() {
            initMemoryGame();

        // 3. Tic Tac Toe
        function initTicTacToe() {
            tttBoard = ['', '', '', '', '', '', '', '', ''];
            tttCurrentPlayer = 'X';
            tttGameOver = false;
            
            const grid = document.getElementById('tttGrid');
            if (!grid) return;
            
            grid.innerHTML = tttBoard.map((_, index) => `
                <div class="ttt-cell" onclick="makeMove(${index})"></div>
            `).join('');
            
            updateTicTacToeStatus();
        }

        function makeMove(index) {
            if (tttGameOver) return;
            if (tttBoard[index] !== '') return;
            
            tttBoard[index] = tttCurrentPlayer;
            const cell = document.querySelectorAll('.ttt-cell')[index];
            cell.innerHTML = tttCurrentPlayer;
            
            if (checkWin()) {
                tttGameOver = true;
                highlightWinningLine();
                setTimeout(() => {
                    alert(`🎉 اللاعب ${tttCurrentPlayer} فاز!`);
                }, 100);
                updateTicTacToeStatus(`اللاعب ${tttCurrentPlayer} فاز!`);
                return;
            }
            
            if (!tttBoard.includes('')) {
                tttGameOver = true;
                setTimeout(() => {
                    alert('🤝 تعادل!');
                }, 100);
                updateTicTacToeStatus('تعادل!');
                return;
            }
            
            tttCurrentPlayer = tttCurrentPlayer === 'X' ? 'O' : 'X';
            updateTicTacToeStatus(`دور اللاعب ${tttCurrentPlayer}`);
            
            if (tttCurrentPlayer === 'O' && !tttGameOver) {
                setTimeout(makeAIMove, 500);
            }
        }

        function makeAIMove() {
            if (tttGameOver) return;
            
            let emptyCells = [];
            tttBoard.forEach((cell, index) => {
                if (cell === '') emptyCells.push(index);
            });
            
            if (emptyCells.length > 0) {
                const randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                makeMove(randomIndex);
            }
        }

        function checkWin() {
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];
            
            return winPatterns.some(pattern => {
                const [a,b,c] = pattern;
                return tttBoard[a] && tttBoard[a] === tttBoard[b] && tttBoard[a] === tttBoard[c];
            });
        }

        function highlightWinningLine() {
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];
            
            winPatterns.forEach(pattern => {
                const [a,b,c] = pattern;
                if (tttBoard[a] && tttBoard[a] === tttBoard[b] && tttBoard[a] === tttBoard[c]) {
                    const cells = document.querySelectorAll('.ttt-cell');
                    cells[a].classList.add('win');
                    cells[b].classList.add('win');
                    cells[c].classList.add('win');
                }
            });
        }

        function updateTicTacToeStatus(message) {
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = message || `دور اللاعب ${tttCurrentPlayer}`;
        }

        function resetTicTacToe() {
            initTicTacToe();
        }

        // 4. Snake Game
        function initSnakeGame() {
            snake = [7, 6, 5];
            snakeDirection = 'right';
            snakeScore = 0;
            
            createSnakeGrid();
            createFood();
            
            if (snakeInterval) clearInterval(snakeInterval);
            snakeInterval = setInterval(moveSnake, 200);
        }

        function createSnakeGrid() {
            const grid = document.getElementById('snakeGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            for (let i = 0; i < 225; i++) {
                const cell = document.createElement('div');
                cell.className = 'snake-cell';
                cell.id = `snake-${i}`;
                grid.appendChild(cell);
            }
            
            updateSnakeDisplay();
        }

        function updateSnakeDisplay() {
            document.querySelectorAll('.snake-cell').forEach(cell => {
                cell.classList.remove('snake', 'food');
            });
            
            snake.forEach(segment => {
                const cell = document.getElementById(`snake-${segment}`);
                if (cell) cell.classList.add('snake');
            });
            
            const foodCell = document.getElementById(`snake-${snakeFood}`);
            if (foodCell) foodCell.classList.add('food');
        }

        function createFood() {
            do {
                snakeFood = Math.floor(Math.random() * 225);
            } while (snake.includes(snakeFood));
        }

        function moveSnake() {
            const head = snake[0];
            let newHead;
            
            switch(snakeDirection) {
                case 'right': newHead = head + 1; break;
                case 'left': newHead = head - 1; break;
                case 'up': newHead = head - 15; break;
                case 'down': newHead = head + 15; break;
            }
            
            if (newHead < 0 || newHead >= 225 || 
                (snakeDirection === 'right' && head % 15 === 14) ||
                (snakeDirection === 'left' && head % 15 === 0)) {
                gameOver();
                return;
            }
            
            if (snake.includes(newHead)) {
                gameOver();
                return;
            }
            
            snake.unshift(newHead);
            
            if (newHead === snakeFood) {
                snakeScore += 10;
                createFood();
                updateSnakeStatus();
            } else {
                snake.pop();
            }
            
            updateSnakeDisplay();
        }

        function gameOver() {
            clearInterval(snakeInterval);
            setTimeout(() => {
                alert(`🐍 انتهت اللعبة! النقاط: ${snakeScore}`);
            }, 100);
        }

        function changeDirection(dir) {
            if ((dir === 'right' && snakeDirection !== 'left') ||
                (dir === 'left' && snakeDirection !== 'right') ||
                (dir === 'up' && snakeDirection !== 'down') ||
                (dir === 'down' && snakeDirection !== 'up')) {
                snakeDirection = dir;
            }
        }

        function updateSnakeStatus() {
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = `الطول: ${snake.length} | النقاط: ${snakeScore}`;
        }

        function resetSnakeGame() {
            initSnakeGame();
        }

        function initShooterGame() {
            shooterScore = 0;
            shooterPosition = 50;

            if (shooterInterval) clearInterval(shooterInterval);
            
            shooterInterval = setInterval(() => {

        function createTarget() {
            const canvas = document.getElementById('shooterCanvas');
            if (!canvas) return;
            
            const target = document.createElement('div');
            target.className = 'target';
            target.style.left = Math.random() * 90 + '%';

        function moveShooter(direction) {

            if (!shooter) return;
            
            if (direction === 'left') {
                shooterPosition = Math.max(0, shooterPosition - 5);

                shooterPosition = Math.min(90, shooterPosition + 5);

        function shoot() {
            const targets = document.querySelectorAll('.target');
            const shooter = document.getElementById('shooter');
            if (!shooter) return;
            
            const shooterRect = shooter.getBoundingClientRect();
            
            targets.forEach(target => {
                const targetRect = target.getBoundingClientRect();
                if (Math.abs(targetRect.left - shooterRect.left) < 50) {
                    target.remove();
                    shooterScore += 10;
                    updateShooterScore();
                }
            });
        }

        function updateShooterScore() {
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = `النقاط: ${shooterScore}`;
        }

        function resetShooterGame() {
            const canvas = document.getElementById('shooterCanvas');
            if (canvas) {
                canvas.querySelectorAll('.target').forEach(el => el.remove());
            }
            shooterScore = 0;
            updateShooterScore();
        }

        // 6. RPS Game
        function playRPS(playerChoice) {
            const choices = ['rock', 'paper', 'scissors'];
            const computerChoice = choices[Math.floor(Math.random() * 3)];
            
            const emojis = {
                rock: '✊',
                paper: '✋',
                scissors: '✌️'
            };
            
            document.getElementById('playerChoice').innerHTML = emojis[playerChoice];
            document.getElementById('computerChoice').innerHTML = emojis[computerChoice];
            
            let result = '';
            if (playerChoice === computerChoice) {
                result = '🤝 تعادل!';
            } else if (
                (playerChoice === 'rock' && computerChoice === 'scissors') ||
                (playerChoice === 'paper' && computerChoice === 'rock') ||
                (playerChoice === 'scissors' && computerChoice === 'paper')
            ) {
                result = '🎉 فزت!';
            } else {
                result = '💻 الكمبيوتر فاز!';
            }
            
            document.getElementById('gameStatus').innerHTML = result;
        }

        // 7. Math Game
        function initMathGame() {
            mathScore = 0;
            newMathQuestion();
        }

        function newMathQuestion() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            mathAnswer = num1 + num2;
            
            const question = document.getElementById('mathQuestion');
            if (question) question.innerHTML = `${num1} + ${num2} = ?`;
            
            const answer = document.getElementById('mathAnswer');
            if (answer) answer.value = '';
        }

        function checkMathAnswer() {
            const answer = parseInt(document.getElementById('mathAnswer').value);
            if (answer === mathAnswer) {
                mathScore += 10;
                alert('✅ إجابة صحيحة!');
                newMathQuestion();
            } else {
                alert('❌ إجابة خاطئة! حاول مرة أخرى');
            }
            
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = `النقاط: ${mathScore}`;
        }

        // 8. Colors Game
        function initColorsGame() {
            colorsScore = 0;
            newColor();
        }

        function newColor() {
            const colors = ['red', 'blue', 'green', 'yellow'];
            currentColor = colors[Math.floor(Math.random() * colors.length)];
            
            const colorBox = document.getElementById('colorBox');
            if (colorBox) colorBox.style.background = currentColor;
        }

        function guessColor(color) {
            if (color === currentColor) {
                colorsScore += 10;
                alert('✅ أحسنت!');
                newColor();
            } else {
                alert('❌ خطأ! حاول مرة أخرى');
            }
            
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = `النقاط: ${colorsScore}`;
        }

        // 9. Puzzle Game
        function initPuzzleGame() {
            currentPuzzle = 0;
            showPuzzle();
        }

        function showPuzzle() {
            const question = document.getElementById('puzzleQuestion');
            if (question) question.innerHTML = puzzles[currentPuzzle].q;
            
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = `اللغز ${currentPuzzle + 1}/${puzzles.length}`;
        }

        function checkPuzzle() {
            const answer = document.getElementById('puzzleAnswer').value;
            if (answer === puzzles[currentPuzzle].a) {
                alert('✅ إجابة صحيحة!');
                nextPuzzle();
            } else {
                alert('❌ إجابة خاطئة! حاول مرة أخرى');
            }
        }

        function nextPuzzle() {
            if (currentPuzzle < puzzles.length - 1) {
                currentPuzzle++;
                showPuzzle();
                document.getElementById('puzzleAnswer').value = '';
            } else {
                alert('🎉 تهانينا! لقد حللت جميع الألغاز!');
            }
        }

        // 10. Pilot Game
        function initPilotGame() {
            pilotScore = 0;
            pilotPosition = 50;
            updatePilotScore();
            
            if (pilotInterval) clearInterval(pilotInterval);
            
            pilotInterval = setInterval(() => {
                createObstacle();
            }, 1500);
        }

        function createObstacle() {
            const canvas = document.getElementById('pilotCanvas');
            if (!canvas) return;
            
            const obstacle = document.createElement('div');
            obstacle.className = 'enemy';
            obstacle.innerHTML = '🌪️';
            obstacle.style.left = Math.random() * 90 + '%';
            obstacle.style.top = '-50px';
            
            canvas.appendChild(obstacle);
            
            setTimeout(() => {
                if (obstacle.parentNode) obstacle.remove();
            }, 3000);
        }

        function movePilot(direction) {
            const pilot = document.getElementById('pilot');
            if (!pilot) return;
            
            if (direction === 'up') {
                pilotPosition = Math.max(0, pilotPosition - 5);
            } else {
                pilotPosition = Math.min(90, pilotPosition + 5);
            }
            
            pilot.style.top = pilotPosition + '%';
            updatePilotScore();
        }

        function updatePilotScore() {
            pilotScore += 10;
            const status = document.getElementById('gameStatus');
            if (status) status.innerHTML = `المسافة: ${pilotScore}`;
        }

        function resetPilotGame() {
            const canvas = document.getElementById('pilotCanvas');
            if (canvas) {
                canvas.querySelectorAll('.enemy').forEach(el => el.remove());
            }
            pilotScore = 0;
            pilotPosition = 50;
            const pilot = document.getElementById('pilot');
            if (pilot) pilot.style.top = '50%';
            updatePilotScore();
        }

        // Close game
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameWrapper').innerHTML = '';
            
            // Clear all intervals
            if (collectorInterval) clearInterval(collectorInterval);
            if (snakeInterval) clearInterval(snakeInterval);
            if (shooterInterval) clearInterval(shooterInterval);
            if (pilotInterval) clearInterval(pilotInterval);
        }

        // Expose functions to global scope
        window.openGame = openGame;
        window.closeGame = closeGame;
        window.movePlayer = movePlayer;
        window.resetCollectorGame = resetCollectorGame;
        window.flipCard = flipCard;
        window.resetMemoryGame = resetMemoryGame;
        window.makeMove = makeMove;
        window.resetTicTacToe = resetTicTacToe;
        window.changeDirection = changeDirection;
        window.resetSnakeGame = resetSnakeGame;
        window.moveShooter = moveShooter;
        window.shoot = shoot;
        window.resetShooterGame = resetShooterGame;
        window.playRPS = playRPS;
        window.checkMathAnswer = checkMathAnswer;
        window.guessColor = guessColor;
        window.checkPuzzle = checkPuzzle;
        window.nextPuzzle = nextPuzzle;
        window.movePilot = movePilot;
        window.resetPilotGame = resetPilotGame;

        // Initialize
        displayGames();
    </script>
</body>
</html>
