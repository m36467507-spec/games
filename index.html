<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 ألعاب مودة ومريم - 27 لعبة</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1f, #1a1f2f);
            color: white;
            direction: rtl;
            padding: 20px;
        }

        /* خلفية باسمائكم */
        body::before {
            content: "❤️ مودة ومريم ❤️";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 100px;
            color: rgba(255, 215, 0, 0.1);
            z-index: -1;
            white-space: nowrap;
        }

        /* الهيدر */
        header {
            background: #1a2a3a;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid gold;
        }

        .logo {
            font-size: 30px;
            font-weight: bold;
            color: gold;
        }

        .points-box {
            background: gold;
            color: #0a0f1f;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 20px;
        }

        /* الأزرار */
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #2a3a4a;
            color: white;
            border: 2px solid gold;
            transition: 0.2s;
        }

        button:hover {
            background: gold;
            color: #0a0f1f;
            transform: scale(1.05);
        }

        /* شبكة الألعاب */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .game-card {
            background: #1a2a3a;
            border: 2px solid gold;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            background: #2a3a4a;
            box-shadow: 0 0 20px gold;
        }

        .game-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .game-title {
            font-size: 14px;
            font-weight: bold;
            color: gold;
        }

        /* منطقة اللعبة */
        .game-area {
            background: #1a2a3a;
            border: 3px solid gold;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            min-height: 400px;
        }

        /* إكس-أو */
        .tic-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 20px auto;
        }

        .tic-cell {
            aspect-ratio: 1;
            background: #2a3a4a;
            border: 2px solid gold;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
        }

        /* الذاكرة */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 20px auto;
        }

        .memory-card {
            aspect-ratio: 1;
            background: gold;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            color: #0a0f1f;
        }

        .memory-card.flipped {
            background: white;
        }

        /* ألعاب الأرقام */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 20px auto;
        }

        .number-cell {
            aspect-ratio: 1;
            background: #2a3a4a;
            border: 2px solid gold;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }

        input {
            padding: 10px;
            margin: 10px;
            border: 2px solid gold;
            border-radius: 10px;
            background: #2a3a4a;
            color: white;
            font-size: 16px;
            width: 200px;
        }

        .status {
            font-size: 18px;
            margin: 15px;
            color: gold;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">❤️ مودة ومريم ❤️</div>
    <div class="points-box" id="points">0</div>
</header>

<!-- القائمة الرئيسية -->
<div id="menu" style="display: block;">
    <h2 style="text-align: center; color: gold; margin: 20px;">🎮 اختر لعبتك</h2>
    <div class="games-grid" id="gamesGrid"></div>
</div>

<!-- منطقة عرض اللعبة -->
<div id="gameContainer" style="display: none;">
    <div id="gameHeader" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <button onclick="backToMenu()">🔙 رجوع</button>
        <h2 id="gameTitle" style="color: gold;"></h2>
        <button onclick="resetCurrentGame()">🔄 إعادة</button>
    </div>
    <div id="gameContent" class="game-area"></div>
</div>

<script>
///////////////////////////////////////////
// نظام النقاط
///////////////////////////////////////////
let points = parseInt(localStorage.getItem('points')) || 0;
document.getElementById('points').textContent = points;

function addPoints(p) {
    points += p;
    localStorage.setItem('points', points);
    document.getElementById('points').textContent = points;
}

///////////////////////////////////////////
// 27 لعبة كاملة
///////////////////////////////////////////
const games = [
    // 1-5 ألعاب كلاسيكية
    { id: 1, name: 'إكس-أو', icon: '❌⭕' },
    { id: 2, name: 'الذاكرة', icon: '🎴' },
    { id: 3, name: 'تخمين الأرقام', icon: '🔢' },
    { id: 4, name: 'حجر ورقة مقص', icon: '✂️' },
    { id: 5, name: 'عملة معدنية', icon: '🪙' },
    
    // 6-10 ألعاب أرقام
    { id: 6, name: 'الجمع السريع', icon: '➕' },
    { id: 7, name: 'الطرح السريع', icon: '➖' },
    { id: 8, name: 'جدول الضرب', icon: '✖️' },
    { id: 9, name: 'القسمة', icon: '➗' },
    { id: 10, name: 'الأكبر والأصغر', icon: '📊' },
    
    // 11-15 ألعاب ذكاء
    { id: 11, name: 'تسلسل الأرقام', icon: '📈' },
    { id: 12, name: 'الرقم المفقود', icon: '🔍' },
    { id: 13, name: 'العد التنازلي', icon: '⏱️' },
    { id: 14, name: 'مضاعفات الرقم', icon: '🔄' },
    { id: 15, name: 'تحليل الرقم', icon: '🔬' },
    
    // 16-20 ألعاب كلمات
    { id: 16, name: 'الحرف الناقص', icon: '📝' },
    { id: 17, name: 'ترتيب الحروف', icon: '🔤' },
    { id: 18, name: 'كلمة السر', icon: '🔐' },
    { id: 19, name: 'عكس الكلمة', icon: '🔄' },
    { id: 20, name: 'أطول كلمة', icon: '📏' },
    
    // 21-27 ألعاب متنوعة
    { id: 21, name: 'الزوجي والفردي', icon: '2️⃣' },
    { id: 22, name: 'مربع العدد', icon: '■' },
    { id: 23, name: 'جذر العدد', icon: '√' },
    { id: 24, name: 'النسبة المئوية', icon: '%' },
    { id: 25, name: 'الكسور', icon: '½' },
    { id: 26, name: 'الأعداد العشرية', icon: '🔟' },
    { id: 27, name: 'الأعداد السالبة', icon: '➖' }
];

// عرض الألعاب في القائمة
function displayGames() {
    let html = '';
    games.forEach(game => {
        html += `
            <div class="game-card" onclick="playGame(${game.id})">
                <div class="game-icon">${game.icon}</div>
                <div class="game-title">${game.name}</div>
            </div>
        `;
    });
    document.getElementById('gamesGrid').innerHTML = html;
}

// العودة للقائمة
function backToMenu() {
    document.getElementById('menu').style.display = 'block';
    document.getElementById('gameContainer').style.display = 'none';
}

// تشغيل لعبة معينة
function playGame(id) {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameContainer').style.display = 'block';
    
    let game = games.find(g => g.id === id);
    document.getElementById('gameTitle').textContent = game.name;
    
    let content = '';
    
    switch(id) {
        // إكس-أو
        case 1:
            content = ticTacToeGame();
            break;
            
        // الذاكرة
        case 2:
            content = memoryGame();
            break;
            
        // تخمين الأرقام
        case 3:
            content = guessNumberGame();
            break;
            
        // حجر ورقة مقص
        case 4:
            content = rpsGame();
            break;
            
        // عملة معدنية
        case 5:
            content = coinGame();
            break;
            
        // الجمع السريع
        case 6:
            content = additionGame();
            break;
            
        // الطرح السريع
        case 7:
            content = subtractionGame();
            break;
            
        // جدول الضرب
        case 8:
            content = multiplicationGame();
            break;
            
        // القسمة
        case 9:
            content = divisionGame();
            break;
            
        // الأكبر والأصغر
        case 10:
            content = compareGame();
            break;
            
        // تسلسل الأرقام
        case 11:
            content = sequenceGame();
            break;
            
        // الرقم المفقود
        case 12:
            content = missingNumberGame();
            break;
            
        // العد التنازلي
        case 13:
            content = countdownGame();
            break;
            
        // مضاعفات الرقم
        case 14:
            content = multiplesGame();
            break;
            
        // تحليل الرقم
        case 15:
            content = factorsGame();
            break;
            
        // الحرف الناقص
        case 16:
            content = missingLetterGame();
            break;
            
        // ترتيب الحروف
        case 17:
            content = arrangeLettersGame();
            break;
            
        // كلمة السر
        case 18:
            content = passwordGame();
            break;
            
        // عكس الكلمة
        case 19:
            content = reverseWordGame();
            break;
            
        // أطول كلمة
        case 20:
            content = longestWordGame();
            break;
            
        // الزوجي والفردي
        case 21:
            content = oddEvenGame();
            break;
            
        // مربع العدد
        case 22:
            content = squareGame();
            break;
            
        // جذر العدد
        case 23:
            content = sqrtGame();
            break;
            
        // النسبة المئوية
        case 24:
            content = percentageGame();
            break;
            
        // الكسور
        case 25:
            content = fractionGame();
            break;
            
        // الأعداد العشرية
        case 26:
            content = decimalGame();
            break;
            
        // الأعداد السالبة
        case 27:
            content = negativeGame();
            break;
    }
    
    document.getElementById('gameContent').innerHTML = content;
}

// إعادة تشغيل اللعبة الحالية
function resetCurrentGame() {
    let title = document.getElementById('gameTitle').textContent;
    let game = games.find(g => g.name === title);
    if (game) playGame(game.id);
}

///////////////////////////////////////////
// الألعاب - كل لعبة دالة منفصلة
///////////////////////////////////////////

// 1. إكس-أو
function ticTacToeGame() {
    return `
        <div style="text-align: center;">
            <div class="tic-grid" id="ticGrid"></div>
            <div class="status" id="ticStatus">دورك يا بطل</div>
        </div>
        <script>
            let ticBoard = ['','','','','','','','',''];
            let ticTurn = 'X';
            let ticGameOver = false;
            
            function renderTic() {
                let html = '';
                for(let i = 0; i < 9; i++) {
                    html += '<div class="tic-cell" onclick="ticMove('+i+')">'+ticBoard[i]+'</div>';
                }
                document.getElementById('ticGrid').innerHTML = html;
            }
            
            function ticMove(i) {
                if(ticGameOver || ticBoard[i] !== '') return;
                ticBoard[i] = 'X';
                renderTic();
                if(!checkTicWin()) {
                    ticTurn = 'O';
                    setTimeout(ticAIMove, 500);
                }
            }
            
            function ticAIMove() {
                let empty = [];
                for(let i = 0; i < 9; i++) if(ticBoard[i] === '') empty.push(i);
                if(empty.length > 0) {
                    ticBoard[empty[Math.floor(Math.random() * empty.length)]] = 'O';
                    renderTic();
                    checkTicWin();
                }
            }
            
            function checkTicWin() {
                let wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for(let w of wins) {
                    if(ticBoard[w[0]] && ticBoard[w[0]] === ticBoard[w[1]] && ticBoard[w[0]] === ticBoard[w[2]]) {
                        ticGameOver = true;
                        if(ticBoard[w[0]] === 'X') {
                            document.getElementById('ticStatus').innerHTML = '🎉 فزت! +5 نقاط';
                            addPoints(5);
                        } else {
                            document.getElementById('ticStatus').innerHTML = 'خسرت';
                        }
                        return true;
                    }
                }
                if(!ticBoard.includes('')) {
                    ticGameOver = true;
                    document.getElementById('ticStatus').innerHTML = 'تعادل';
                    return true;
                }
                return false;
            }
            
            renderTic();
        <\/script>
    `;
}

// 2. الذاكرة
function memoryGame() {
    return `
        <div style="text-align: center;">
            <div class="memory-grid" id="memoryGrid"></div>
            <div class="status">المحاولات: <span id="memoryMoves">0</span></div>
        </div>
        <script>
            let memCards = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];
            memCards = [...memCards, ...memCards].sort(() => Math.random() - 0.5);
            let memFlipped = new Array(16).fill(false);
            let memMatched = new Array(16).fill(false);
            let memMoves = 0;
            let memLock = false;
            
            function renderMemory() {
                let html = '';
                for(let i = 0; i < 16; i++) {
                    let cls = 'memory-card';
                    if(memFlipped[i] || memMatched[i]) cls += ' flipped';
                    html += '<div class="'+cls+'" onclick="memoryFlip('+i+')">';
                    html += memFlipped[i] || memMatched[i] ? memCards[i] : '❓';
                    html += '</div>';
                    if((i+1) % 4 === 0) html += '<br>';
                }
                document.getElementById('memoryGrid').innerHTML = html;
            }
            
            function memoryFlip(i) {
                if(memLock || memMatched[i] || memFlipped[i]) return;
                
                memFlipped[i] = true;
                renderMemory();
                
                let flipped = [];
                for(let j = 0; j < 16; j++) if(memFlipped[j] && !memMatched[j]) flipped.push(j);
                
                if(flipped.length === 2) {
                    memLock = true;
                    memMoves++;
                    document.getElementById('memoryMoves').textContent = memMoves;
                    
                    if(memCards[flipped[0]] === memCards[flipped[1]]) {
                        memMatched[flipped[0]] = memMatched[flipped[1]] = true;
                        memFlipped[flipped[0]] = memFlipped[flipped[1]] = false;
                        memLock = false;
                        renderMemory();
                        
                        if(memMatched.every(v => v)) {
                            alert('🎉 فزت! +10 نقاط');
                            addPoints(10);
                        }
                    } else {
                        setTimeout(() => {
                            memFlipped[flipped[0]] = memFlipped[flipped[1]] = false;
                            memLock = false;
                            renderMemory();
                        }, 1000);
                    }
                }
            }
            
            renderMemory();
        <\/script>
    `;
}

// 3. تخمين الأرقام
function guessNumberGame() {
    let secret = Math.floor(Math.random() * 100) + 1;
    return `
        <div style="text-align: center;">
            <h3>خمن الرقم من 1 ل 100</h3>
            <input type="number" id="guessInput" placeholder="تخمينك">
            <button onclick="checkGuess(${secret})">تحقق</button>
            <div class="status" id="guessStatus"></div>
        </div>
        <script>
            function checkGuess(s) {
                let g = parseInt(document.getElementById('guessInput').value);
                let status = document.getElementById('guessStatus');
                if(g === s) {
                    status.innerHTML = '🎉 صح! +5 نقاط';
                    addPoints(5);
                } else if(g < s) {
                    status.innerHTML = 'الرقم أكبر';
                } else {
                    status.innerHTML = 'الرقم أصغر';
                }
            }
        <\/script>
    `;
}

// 4. حجر ورقة مقص
function rpsGame() {
    return `
        <div style="text-align: center;">
            <h3>اختار:</h3>
            <button onclick="playRPS('حجر')">🪨 حجر</button>
            <button onclick="playRPS('ورقة')">📄 ورقة</button>
            <button onclick="playRPS('مقص')">✂️ مقص</button>
            <div class="status" id="rpsStatus"></div>
        </div>
        <script>
            function playRPS(player) {
                let choices = ['حجر','ورقة','مقص'];
                let computer = choices[Math.floor(Math.random() * 3)];
                let result = '';
                
                if(player === computer) result = 'تعادل';
                else if(
                    (player === 'حجر' && computer === 'مقص') ||
                    (player === 'ورقة' && computer === 'حجر') ||
                    (player === 'مقص' && computer === 'ورقة')
                ) {
                    result = '🎉 فزت! +3 نقاط';
                    addPoints(3);
                } else {
                    result = 'خسرت';
                }
                
                document.getElementById('rpsStatus').innerHTML = 
                    'اخترت: ' + player + ' - الكمبيوتر: ' + computer + '<br>' + result;
            }
        <\/script>
    `;
}

// 5. عملة معدنية
function coinGame() {
    return `
        <div style="text-align: center;">
            <h3>اختر:</h3>
            <button onclick="playCoin('صورة')">👤 صورة</button>
            <button onclick="playCoin('كتابة')">💰 كتابة</button>
            <div class="status" id="coinStatus"></div>
        </div>
        <script>
            function playCoin(player) {
                let coin = Math.random() < 0.5 ? 'صورة' : 'كتابة';
                let result = coin === player ? '🎉 فزت! +2 نقاط' : 'خسرت';
                if(coin === player) addPoints(2);
                document.getElementById('coinStatus').innerHTML = 
                    'النتيجة: ' + coin + '<br>' + result;
            }
        <\/script>
    `;
}

// 6. الجمع السريع
function additionGame() {
    let a = Math.floor(Math.random() * 20) + 1;
    let b = Math.floor(Math.random() * 20) + 1;
    return `
        <div style="text-align: center;">
            <h3>${a} + ${b} = ؟</h3>
            <input type="number" id="addInput" placeholder="الإجابة">
            <button onclick="checkAdd(${a}, ${b})">تحقق</button>
            <div class="status" id="addStatus"></div>
        </div>
        <script>
            function checkAdd(a, b) {
                let answer = parseInt(document.getElementById('addInput').value);
                if(answer === a + b) {
                    document.getElementById('addStatus').innerHTML = '🎉 صح! +1 نقطة';
                    addPoints(1);
                } else {
                    document.getElementById('addStatus').innerHTML = '❌ خطأ';
                }
            }
        <\/script>
    `;
}

// 7. الطرح السريع
function subtractionGame() {
    let a = Math.floor(Math.random() * 20) + 10;
    let b = Math.floor(Math.random() * 10) + 1;
    return `
        <div style="text-align: center;">
            <h3>${a} - ${b} = ؟</h3>
            <input type="number" id="subInput" placeholder="الإجابة">
            <button onclick="checkSub(${a}, ${b})">تحقق</button>
            <div class="status" id="subStatus"></div>
        </div>
        <script>
            function checkSub(a, b) {
                let answer = parseInt(document.getElementById('subInput').value);
                if(answer === a - b) {
                    document.getElementById('subStatus').innerHTML = '🎉 صح! +1 نقطة';
                    addPoints(1);
                } else {
                    document.getElementById('subStatus').innerHTML = '❌ خطأ';
                }
            }
        <\/script>
    `;
}

// 8. جدول الضرب
function multiplicationGame() {
    let a = Math.floor(Math.random() * 10) + 1;
    let b = Math.floor(Math.random() * 10) + 1;
    return `
        <div style="text-align: center;">
            <h3>${a} × ${b} = ؟</h3>
            <input type="number" id="mulInput" placeholder="الإجابة">
            <button onclick="checkMul(${a}, ${b})">تحقق</button>
            <div class="status" id="mulStatus"></div>
        </div>
        <script>
            function checkMul(a, b) {
                let answer = parseInt(document.getElementById('mulInput').value);
                if(answer === a * b) {
                    document.getElementById('mulStatus').innerHTML = '🎉 صح! +2 نقاط';
                    addPoints(2);
                } else {
                    document.getElementById('mulStatus').innerHTML = '❌ خطأ';
                }
            }
        <\/script>
    `;
}

// 9. القسمة
function divisionGame() {
    let b = Math.floor(Math.random() * 5) + 1;
    let a = b * (Math.floor(Math.random() * 5) + 1);
    return `
        <div style="text-align: center;">
            <h3>${a} ÷ ${b} = ؟</h3>
            <input type="number" id="divInput" placeholder="الإجابة">
            <button onclick="checkDiv(${a}, ${b})">تحقق</button>
            <div class="status" id="divStatus"></div>
        </div>
        <script>
            function checkDiv(a, b) {
                let answer = parseInt(document.getElementById('divInput').value);
                if(answer === a / b) {
                    document.getElementById('divStatus').innerHTML = '🎉 صح! +3 نقاط';
                    addPoints(3);
                } else {
                    document.getElementById('divStatus').innerHTML = '❌ خطأ';
                }
            }
        <\/script>

// 10. الأكبر والأصغر
function compareGame() {
    let a = Math.floor(Math.random() * 50) + 1;
    let b = Math.floor(Math.random() * 50) + 1;
    return `
        <div style="text-align: center;">
            <h3>${a} _ ${b}</h3>
            <button onclick="checkCompare(${a}, ${b}, '>')">أكبر ></button>
            <button onclick="checkCompare(${a}, ${b}, '<')">أصغر <</button>
            <button onclick="checkCompare(${a}, ${b}, '=')">يساوي =</button>
            <div class="status" id="compStatus"></div>
        </div>
        <script>
            function checkCompare(a, b, op) {
                let correct = false;
                if(op === '>' && a > b) correct = true;
                if(op === '<' && a < b) correct = true;
                if(op === '=' && a === b) correct = true;
                
                if(correct) {
                    document.getElementById('compStatus').innerHTML = '🎉 صح! +2 نقاط';
                    addPoints(2);
                } else {
                    document.getElementById('compStatus').innerHTML = '❌ خطأ';
                }
            }
        <\/script>
    `;
}

// 13. العد التنازلي
function countdownGame() {
    let target = Math.floor(Math.random() * 50) + 20;
    return `
        <div style="text-align: center;">
            <h3>اعد تنازلياً من ${target} إلى 0</h3>
            <div class="numbers-grid" id="countGrid"></div>
            <div class="status" id="countStatus"></div>
        </div>
        <script>
            let nums = [];
            for(let i = 0; i <= ${target}; i++) nums.push(i);
            nums = nums.sort(() => Math.random() - 0.5);
            let currentNum = ${target};
            
            function renderCount() {
                let html = '';
                for(let n of nums) {
                    html += '<div class="number-cell" onclick="checkCount('+n+')">'+n+'</div>';
                }
                document.getElementById('countGrid').innerHTML = html;
            }
            
            function checkCount(n) {
                if(n === currentNum) {
                    currentNum--;
                    if(currentNum < 0) {
                        document.getElementById('countStatus').innerHTML = '🎉 أحسنت! +5 نقاط';
                        addPoints(5);
                    }
                    renderCount();
                }
            }
            
            renderCount();
        <\/script>
    `;
}
