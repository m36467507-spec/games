<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الألعاب المتقدمة</title>

<!-- تحميل المكتبات الأساسية أولاً -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a2f3f, #162b3a);
    color: white;
    text-align: center;
    direction: rtl;
    min-height: 100vh;
}

header {
    padding: 20px;
    background: #0d47a1;
    font-size: 28px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
}

section {
    display: none;
    padding: 25px 15px;
    max-width: 900px;
    margin: 0 auto;
}

.active {
    display: block;
}

/* الأزرار واضحة وظاهرة */
button {
    padding: 15px 30px;
    margin: 10px;
    border: none;
    border-radius: 50px;
    background: #ff6b6b;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255,107,107,0.4);
    transition: 0.3s;
    min-width: 200px;
    border: 2px solid transparent;
}

button:hover {
    transform: scale(1.05);
    background: #ff5252;
    box-shadow: 0 6px 20px rgba(255,82,82,0.5);
}

/* أزرار الألعاب في القائمة الرئيسية */
.game-btn {
    background: #4caf50;
    box-shadow: 0 4px 15px rgba(76,175,80,0.4);
    font-size: 20px;
    width: 250px;
}

.game-btn:hover {
    background: #45a049;
}

.back-btn {
    background: #9e9e9e;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.back-btn:hover {
    background: #757575;
}

input {
    padding: 15px 25px;
    margin: 10px;
    border: 3px solid #4caf50;
    border-radius: 50px;
    font-size: 18px;
    width: 300px;
    text-align: center;
}

#board {
    width: 400px;
    margin: 20px auto;
    border: 5px solid #333;
    border-radius: 10px;
}

/* شبكة الألعاب */
.games-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    margin: 30px 0;
}

.game-area {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 25px;
    margin: 20px 0;
}

table {
    margin: auto;
    background: white;
    color: black;
    border-collapse: collapse;
    width: 100%;
    max-width: 500px;
    border-radius: 10px;
    overflow: hidden;
}

td, th {
    padding: 12px;
    border: 1px solid #ddd;
}

th {
    background: #0d47a1;
    color: white;
}

/* ألعاب إضافية */
.tictactoe-cell {
    width: 90px;
    height: 90px;
    background: #34495e;
    border: 2px solid #4caf50;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    margin: 5px;
    border-radius: 15px;
    color: white;
}

#memoryBoard {
    max-width: 400px;
    margin: auto;
}

.memory-card {
    width: 70px;
    height: 70px;
    background: #0d47a1;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 25px;
    margin: 5px;
    cursor: pointer;
    color: white;
    transition: 0.3s;
}

.memory-card.flipped {
    background: white;
    color: black;
}

canvas {
    border: 3px solid #333;
    border-radius: 10px;
    background: #111;
    max-width: 100%;
}
</style>
</head>
<body>

<header>🎮 منصة الألعاب المتقدمة</header>

<!-- صفحة تسجيل الدخول -->
<section id="auth" class="active">
    <h2 style="margin-bottom: 30px;">👋 مرحباً بك</h2>
    <input type="text" id="username" placeholder="اكتب اسم المستخدم">
    <br>
    <button onclick="login()" style="background: #4caf50; width: 200px;">دخول ▶</button>
</section>

<!-- القائمة الرئيسية -->
<section id="menu">
    <h2 id="welcome" style="margin-bottom: 30px;"></h2>
    
    <div class="games-container">
        <button class="game-btn" onclick="showGame('chess')">♟️ الشطرنج</button>
        <button class="game-btn" onclick="showGame('tictactoe')">⭕ إكس-أو</button>
        <button class="game-btn" onclick="showGame('memory')">🎴 لعبة الذاكرة</button>
        <button class="game-btn" onclick="showGame('snake')">🐍 الثعبان</button>
        <button class="game-btn" style="background: #ffa000;" onclick="showRanking()">🏆 الترتيب</button>
        <button class="back-btn" onclick="logout()">🚪 تسجيل خروج</button>
    </div>
</section>

<!-- لعبة الشطرنج -->
<section id="chess" class="game-area">
    <h2>♟️ الشطرنج</h2>
    <div id="board"></div>
    <p id="chessStatus" style="margin: 15px; font-size: 18px;"></p>
    <button onclick="resetChess()">🔄 إعادة</button>
    <button class="back-btn" onclick="backToMenu()">🔙 رجوع</button>
</section>

<!-- لعبة إكس-أو -->
<section id="tictactoe" class="game-area">
    <h2>⭕ إكس-أو</h2>
    <div id="tictactoeBoard"></div>
    <p id="tictactoeStatus" style="margin: 15px; font-size: 18px;"></p>
    <button onclick="resetTicTacToe()">🔄 إعادة</button>
    <button class="back-btn" onclick="backToMenu()">🔙 رجوع</button>
</section>

<!-- لعبة الذاكرة -->
<section id="memory" class="game-area">
    <h2>🎴 الذاكرة</h2>
    <p>عدد المحاولات: <span id="moves">0</span></p>
    <div id="memoryBoard"></div>
    <br>
    <button onclick="resetMemory()">🔄 إعادة</button>
    <button class="back-btn" onclick="backToMenu()">🔙 رجوع</button>
</section>

<!-- لعبة الثعبان -->
<section id="snake" class="game-area">
    <h2>🐍 الثعبان</h2>
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
    <p id="snakeScore">النتيجة: 0</p>
    <p>استخدم الأسهم للتحريك ↑ ↓ → ←</p>
    <button onclick="resetSnake()">🔄 إعادة</button>
    <button class="back-btn" onclick="backToMenu()">🔙 رجوع</button>
</section>

<!-- صفحة الترتيب -->
<section id="ranking" class="game-area">
    <h2>🏆 الترتيب</h2>
    <table id="rankTable">
        <tr><th>اللاعب</th><th>النقاط</th></tr>
    </table>
    <br>
    <button class="back-btn" onclick="backToMenu()">🔙 رجوع</button>
</section>

<script>
///////////////////////////////////////////
// كود مبسط ومضمون الشغل
///////////////////////////////////////////

// متغيرات عامة
let currentUser = null;

// تسجيل الدخول
function login() {
    let name = document.getElementById("username").value.trim();
    if (name === "") {
        alert("الرجاء كتابة اسم المستخدم");
        return;
    }
    
    currentUser = name;
    
    // حفظ النقاط إذا كان مستخدم جديد
    if (localStorage.getItem("points_" + name) === null) {
        localStorage.setItem("points_" + name, 0);
    }
    
    // عرض رسالة الترحيب
    let points = localStorage.getItem("points_" + name);
    document.getElementById("welcome").innerHTML = `مرحباً ${name} - نقاطك: ${points}`;
    
    // إظهار القائمة
    showSection("menu");
}

// تسجيل الخروج
function logout() {
    currentUser = null;
    showSection("auth");
}

// إظهار قسم معين
function showSection(id) {
    // إخفاء كل الأقسام
    let sections = document.querySelectorAll("section");
    for (let i = 0; i < sections.length; i++) {
        sections[i].classList.remove("active");
    }
    
    // إظهار القسم المطلوب
    document.getElementById(id).classList.add("active");
    
    // تحديث بيانات بعض الأقسام
    if (id === "ranking") {
        loadRanking();
    }
}

// إظهار لعبة معينة
function showGame(game) {
    showSection(game);
    
    // بدء اللعبة
    if (game === "chess") {
        resetChess();
    } else if (game === "tictactoe") {
        resetTicTacToe();
    } else if (game === "memory") {
        resetMemory();
    } else if (game === "snake") {
        resetSnake();
    }
}

// إظهار الترتيب
function showRanking() {
    showSection("ranking");
}

// الرجوع للقائمة
function backToMenu() {
    showSection("menu");
    // تحديث النقاط في القائمة
    if (currentUser) {
        let points = localStorage.getItem("points_" + currentUser);
        document.getElementById("welcome").innerHTML = `مرحباً ${currentUser} - نقاطك: ${points}`;
    }
}

// إضافة نقاط
function addPoints(p) {
    if (!currentUser) return;
    
    let currentPoints = parseInt(localStorage.getItem("points_" + currentUser)) || 0;
    let newPoints = currentPoints + p;
    localStorage.setItem("points_" + currentUser, newPoints);
    
    // رسالة للمستخدم
    alert(`+${p} نقطة! مجموع نقاطك: ${newPoints}`);
}

//////////////////////////////
// لعبة الشطرنج
//////////////////////////////
let chessGame = null;
let chessBoard = null;

function initChess() {
    if (typeof Chess === 'undefined' || typeof Chessboard === 'undefined') {
        console.log("مكتبات الشطرنج لم تحمل بعد");
        return;
    }
    
    try {
        chessGame = new Chess();
        
        chessBoard = Chessboard('board', {
            draggable: true,
            position: 'start',
            onDrop: function(source, target) {
                if (!currentUser) return 'snapback';
                
                let move = chessGame.move({
                    from: source,
                    to: target,
                    promotion: 'q'
                });
                
                if (move === null) return 'snapback';
                
                updateChessStatus();
                
                // حركة الكمبيوتر
                setTimeout(aiMove, 300);
            }
        });
    } catch(e) {
        console.log("خطأ في الشطرنج: " + e);
    }
}

function aiMove() {
    if (!chessGame) return;
    
    let moves = chessGame.moves();
    if (moves.length > 0) {
        let randomMove = moves[Math.floor(Math.random() * moves.length)];
        chessGame.move(randomMove);
        chessBoard.position(chessGame.fen());
        updateChessStatus();
    }
}

function updateChessStatus() {
    let statusDiv = document.getElementById("chessStatus");
    if (!chessGame) return;
    
    if (chessGame.in_checkmate()) {
        statusDiv.innerHTML = "🎉 فوز! +10 نقاط";
        if (currentUser) addPoints(10);
    } else if (chessGame.in_draw()) {
        statusDiv.innerHTML = "تعادل";
    } else {
        statusDiv.innerHTML = "دورك";
    }
}

function resetChess() {
    if (chessGame && chessBoard) {
        chessGame.reset();
        chessBoard.start();
        document.getElementById("chessStatus").innerHTML = "";
    } else {
        initChess();
    }
}

//////////////////////////////
// لعبة إكس-أو
//////////////////////////////
let ticBoard = ["", "", "", "", "", "", "", "", ""];
let ticTurn = "X";
let ticGameOver = false;

function createTicBoard() {
    let html = "";
    for (let i = 0; i < 9; i++) {
        html += `<div class="tictactoe-cell" onclick="ticMove(${i})">${ticBoard[i]}</div>`;
        if ((i + 1) % 3 === 0) html += "<br>";
    }
    document.getElementById("tictactoeBoard").innerHTML = html;
}

function ticMove(index) {
    if (ticGameOver || ticBoard[index] !== "" || ticTurn !== "X" || !currentUser) return;
    
    ticBoard[index] = "X";
    createTicBoard();
    
    if (!checkTicWinner()) {
        ticTurn = "O";
        setTimeout(ticAIMove, 500);
    }
}

function ticAIMove() {
    if (ticGameOver) return;
    
    let empty = [];
    for (let i = 0; i < 9; i++) {
        if (ticBoard[i] === "") empty.push(i);
    }
    
    if (empty.length > 0) {
        let random = empty[Math.floor(Math.random() * empty.length)];
        ticBoard[random] = "O";
        createTicBoard();
        ticTurn = "X";
        checkTicWinner();
    }
}

function checkTicWinner() {
    let winPatterns = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];
    
    for (let p of winPatterns) {
        if (ticBoard[p[0]] && ticBoard[p[0]] === ticBoard[p[1]] && ticBoard[p[0]] === ticBoard[p[2]]) {
            ticGameOver = true;
            if (ticBoard[p[0]] === "X") {
                document.getElementById("tictactoeStatus").innerHTML = "🎉 فزت! +5 نقاط";
                addPoints(5);
            } else {
                document.getElementById("tictactoeStatus").innerHTML = "الكمبيوتر فاز";
            }
            return true;
        }
    }
    
    if (!ticBoard.includes("")) {
        ticGameOver = true;
        document.getElementById("tictactoeStatus").innerHTML = "تعادل";
        return true;
    }
    
    return false;
}

function resetTicTacToe() {
    ticBoard = ["", "", "", "", "", "", "", "", ""];
    ticTurn = "X";
    ticGameOver = false;
    createTicBoard();
    document.getElementById("tictactoeStatus").innerHTML = "";
}

//////////////////////////////
// لعبة الذاكرة
//////////////////////////////
let memCards = [];
let memFlipped = [];
let memMatched = [];
let memMoves = 0;
let memLock = false;

function initMemory() {
    let emojis = ["🐶", "🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼"];
    memCards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
    memFlipped = new Array(16).fill(false);
    memMatched = new Array(16).fill(false);
    memMoves = 0;
    memLock = false;
    document.getElementById("moves").innerHTML = "0";
    renderMemory();
}

function renderMemory() {
    let html = "";
    for (let i = 0; i < 16; i++) {
        let cls = "memory-card";
        if (memFlipped[i] || memMatched[i]) cls += " flipped";
        
        html += `<div class="${cls}" onclick="memFlip(${i})">`;
        if (memFlipped[i] || memMatched[i]) {
            html += memCards[i];
        } else {
            html += "❓";
        }
        html += "</div>";
        
        if ((i + 1) % 4 === 0) html += "<br>";
    }
    document.getElementById("memoryBoard").innerHTML = html;
}

function memFlip(idx) {
    if (memLock || memMatched[idx] || memFlipped[idx]) return;
    
    memFlipped[idx] = true;
    renderMemory();
    
    let flipped = [];
    for (let i = 0; i < 16; i++) {
        if (memFlipped[i] && !memMatched[i]) flipped.push(i);
    }
    
    if (flipped.length === 2) {
        memLock = true;
        memMoves++;
        document.getElementById("moves").innerHTML = memMoves;
        
        if (memCards[flipped[0]] === memCards[flipped[1]]) {
            memMatched[flipped[0]] = true;
            memMatched[flipped[1]] = true;
            memFlipped[flipped[0]] = false;
            memFlipped[flipped[1]] = false;
            memLock = false;
            renderMemory();
            
            // فحص الفوز
            let allMatched = true;
            for (let i = 0; i < 16; i++) {
                if (!memMatched[i]) allMatched = false;
            }
            
            if (allMatched) {
                setTimeout(() => {
                    alert("🎉 أحسنت! +15 نقطة");
                    if (currentUser) addPoints(15);
                    initMemory();
                }, 500);
            }
        } else {
            setTimeout(() => {
                memFlipped[flipped[0]] = false;
                memFlipped[flipped[1]] = false;
                memLock = false;
                renderMemory();
            }, 800);
        }
    }
}

function resetMemory() {
    initMemory();
}

//////////////////////////////
// لعبة الثعبان
//////////////////////////////
let snakeCtx;
let snakeBody = [];
let snakeFood = {x: 100, y: 100};
let snakeDir = "RIGHT";
let snakeScore = 0;
let snakeGameActive = false;
let snakeInterval;

function initSnake() {
    let canvas = document.getElementById("snakeCanvas");
    if (canvas) {
        snakeCtx = canvas.getContext("2d");
        resetSnake();
    }
}

function resetSnake() {
    if (snakeInterval) clearInterval(snakeInterval);
    
    snakeBody = [
        {x: 200, y: 200},
        {x: 190, y: 200},
        {x: 180, y: 200}
    ];
    snakeDir = "RIGHT";
    snakeScore = 0;
    snakeGameActive = true;
    document.getElementById("snakeScore").innerHTML = "النتيجة: 0";
    generateSnakeFood();
    drawSnake();
    
    snakeInterval = setInterval(() => {
        if (snakeGameActive && currentUser) {
            moveSnake();
            drawSnake();
        }
    }, 150);
}

function generateSnakeFood() {
    snakeFood = {
        x: Math.floor(Math.random() * 20) * 20,
        y: Math.floor(Math.random() * 20) * 20
    };
}

function moveSnake() {
    let head = {x: snakeBody[0].x, y: snakeBody[0].y};
    
    switch(snakeDir) {
        case "RIGHT": head.x += 20; break;
        case "LEFT": head.x -= 20; break;
        case "UP": head.y -= 20; break;
        case "DOWN": head.y += 20; break;
    }
    
    // فحص الأكل
    if (head.x === snakeFood.x && head.y === snakeFood.y) {
        snakeScore += 10;
        document.getElementById("snakeScore").innerHTML = `النتيجة: ${snakeScore}`;
        generateSnakeFood();
        
        // نقاط إضافية
        if (snakeScore % 50 === 0 && currentUser) {
            addPoints(5);
        }
    } else {
        snakeBody.pop();
    }
    
    // فحص الحدود
    if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
        snakeGameActive = false;
        clearInterval(snakeInterval);
        alert(`اللعبة انتهت! نقاطك: ${snakeScore}`);
        return;
    }
    
    // فحص الاصطدام بالنفس
    for (let s of snakeBody) {
        if (head.x === s.x && head.y === s.y) {
            snakeGameActive = false;
            clearInterval(snakeInterval);
            alert(`اللعبة انتهت! نقاطك: ${snakeScore}`);
            return;
        }
    }
    
    snakeBody.unshift(head);
}

function drawSnake() {
    if (!snakeCtx) return;
    
    snakeCtx.fillStyle = "#111";
    snakeCtx.fillRect(0, 0, 400, 400);
    
    // رسم الثعبان
    snakeCtx.fillStyle = "#4caf50";
    for (let s of snakeBody) {
        snakeCtx.fillRect(s.x, s.y, 18, 18);
    }
    
    // رسم الأكل
    snakeCtx.fillStyle = "#ff4444";
    snakeCtx.fillRect(snakeFood.x, snakeFood.y, 18, 18);
}

// التحكم بالثعبان
document.addEventListener("keydown", function(e) {
    if (!snakeGameActive || !currentUser) return;
    
    if (e.key === "ArrowRight" && snakeDir !== "LEFT") snakeDir = "RIGHT";
    else if (e.key === "ArrowLeft" && snakeDir !== "RIGHT") snakeDir = "LEFT";
    else if (e.key === "ArrowUp" && snakeDir !== "DOWN") snakeDir = "UP";
    else if (e.key === "ArrowDown" && snakeDir !== "UP") snakeDir = "DOWN";
});

//////////////////////////////
// نظام الترتيب
//////////////////////////////
function loadRanking() {
    let table = document.getElementById("rankTable");
    table.innerHTML = "<tr><th>اللاعب</th><th>النقاط</th></tr>";
    
    let players = [];
    
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith("points_")) {
            let name = key.replace("points_", "");
            let points = localStorage.getItem(key);
            players.push({name: name, points: parseInt(points)});
        }
    }
    
    players.sort((a, b) => b.points - a.points);
    
    for (let p of players) {
        table.innerHTML += `<tr><td>${p.name}</td><td>${p.points}</td></tr>`;
    }
}

//////////////////////////////
// بدء التطبيق
//////////////////////////////
window.onload = function() {
    console.log("التطبيق بدأ");
    
    // بدء الألعاب
    setTimeout(() => {
        initChess();
        initMemory();
        initSnake();
        createTicBoard();
    }, 500);
    
    // عرض صفحة تسجيل الدخول
    showSection("auth");
};
</script>

</body>
</html>
