<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 ألعاب مودة ومريم</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffc0cb, #ffb6c1);
            color: #4a2c2c;
            direction: rtl;
            padding: 20px;
        }

        /* الهيدر */
        header {
            background: #ff69b4;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid white;
        }

        .logo {
            font-size: 30px;
            font-weight: bold;
            color: white;
        }

        .points-box {
            background: white;
            color: #ff69b4;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 20px;
        }

        /* شبكة الألعاب */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .game-card {
            background: white;
            border: 2px solid #ff69b4;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            background: #ffe4e1;
            box-shadow: 0 0 20px #ff69b4;
        }

        .game-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .game-title {
            font-size: 14px;
            font-weight: bold;
            color: #ff69b4;
        }

        /* منطقة اللعبة */
        .game-area {
            background: white;
            border: 3px solid #ff69b4;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            min-height: 400px;
        }

        /* الأزرار */
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #ff69b4;
            color: white;
            border: 2px solid white;
            transition: 0.2s;
        }

        button:hover {
            background: white;
            color: #ff69b4;
            transform: scale(1.05);
        }

        /* إكس-أو */
        .tic-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 20px auto;
        }

        .tic-cell {
            aspect-ratio: 1;
            background: #ffe4e1;
            border: 2px solid #ff69b4;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
        }

        /* ألعاب البنات */
        .style-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .style-item {
            width: 80px;
            height: 80px;
            background: #ffe4e1;
            border: 2px solid #ff69b4;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 30px;
        }

        .style-item:hover {
            background: #ff69b4;
            color: white;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .color-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
        }

        .status {
            font-size: 20px;
            margin: 20px;
            color: #ff69b4;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🎀 مودة ومريم</div>
    <div class="points-box" id="points">0</div>
</header>

<!-- القائمة الرئيسية -->
<div id="menu">
    <h2 style="text-align: center; color: white; margin: 20px;">🎀 اختاروا لعبتكم 🎀</h2>
    <div class="games-grid" id="gamesGrid"></div>
</div>

<!-- منطقة عرض اللعبة -->
<div id="gameContainer" style="display: none;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <button onclick="backToMenu()">🔙 رجوع</button>
        <h2 id="gameTitle" style="color: white;"></h2>
        <button onclick="resetCurrentGame()">🔄 إعادة</button>
    </div>
    <div id="gameContent" class="game-area"></div>
</div>

<script>
///////////////////////////////////////////
// نظام النقاط
///////////////////////////////////////////
let points = parseInt(localStorage.getItem('points')) || 0;
document.getElementById('points').textContent = points;

function addPoints(p) {
    points += p;
    localStorage.setItem('points', points);
    document.getElementById('points').textContent = points;
    alert(`🎀 +${p} نقطة!`);
}

///////////////////////////////////////////
// 10 ألعاب أساسية (مضمونة)
///////////////////////////////////////////
const games = [
    { id: 1, name: 'إكس-أو', icon: '❌⭕' },
    { id: 2, name: 'تخمين الأرقام', icon: '🔢' },
    { id: 3, name: 'حجر ورقة مقص', icon: '✂️' },
    { id: 4, name: 'الجمع السريع', icon: '➕' },
    { id: 5, name: 'تسريحة شعر', icon: '💇' },
    { id: 6, name: 'تلوين أظافر', icon: '💅' },
    { id: 7, name: 'فستان أميرة', icon: '👗' },
    { id: 8, name: 'مكياج عيون', icon: '👁️' },
    { id: 9, name: 'تزيين كعكة', icon: '🍰' },
    { id: 10, name: 'مجوهرات', icon: '💎' }
];

// عرض الألعاب في القائمة
function displayGames() {
    let html = '';
    for(let i = 0; i < games.length; i++) {
        html += `
            <div class="game-card" onclick="playGame(${games[i].id})">
                <div class="game-icon">${games[i].icon}</div>
                <div class="game-title">${games[i].name}</div>
            </div>
        `;
    }
    document.getElementById('gamesGrid').innerHTML = html;
}

// العودة للقائمة
function backToMenu() {
    document.getElementById('menu').style.display = 'block';
    document.getElementById('gameContainer').style.display = 'none';
}

// تشغيل لعبة معينة
function playGame(id) {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameContainer').style.display = 'block';
    
    let game = games.find(g => g.id === id);
    document.getElementById('gameTitle').textContent = game.name;
    
    let content = '';
    
    switch(id) {
        case 1: content = ticTacToeGame(); break;
        case 2: content = guessNumberGame(); break;
        case 3: content = rpsGame(); break;
        case 4: content = additionGame(); break;
        case 5: content = hairGame(); break;
        case 6: content = nailsGame(); break;
        case 7: content = dressGame(); break;
        case 8: content = makeupGame(); break;
        case 9: content = cakeGame(); break;
        case 10: content = jewelryGame(); break;
    }
    
    document.getElementById('gameContent').innerHTML = content;
}

// إعادة تشغيل اللعبة الحالية
function resetCurrentGame() {
    let title = document.getElementById('gameTitle').textContent;
    let game = games.find(g => g.name === title);
    if(game) playGame(game.id);
}

///////////////////////////////////////////
// لعبة إكس-أو
///////////////////////////////////////////
function ticTacToeGame() {
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">❌⭕ إكس-أو</h3>
            <div class="tic-grid" id="ticGrid"></div>
            <div class="status" id="ticStatus">دور X</div>
            <button onclick="resetTic()">🔄 إعادة</button>
        </div>
        <script>
            let ticBoard = ['','','','','','','','',''];
            let ticTurn = 'X';
            let ticGameOver = false;
            
            function renderTic() {
                let html = '';
                for(let i = 0; i < 9; i++) {
                    html += '<div class="tic-cell" onclick="window.ticMove('+i+')">'+ticBoard[i]+'</div>';
                }
                document.getElementById('ticGrid').innerHTML = html;
            }
            
            window.ticMove = function(i) {
                if(ticGameOver || ticBoard[i] !== '') return;
                ticBoard[i] = 'X';
                renderTic();
                if(!checkTicWin()) {
                    setTimeout(window.ticAIMove, 500);
                }
            };
            
            window.ticAIMove = function() {
                let empty = [];
                for(let i = 0; i < 9; i++) if(ticBoard[i] === '') empty.push(i);
                if(empty.length > 0) {
                    ticBoard[empty[Math.floor(Math.random() * empty.length)]] = 'O';
                    renderTic();
                    checkTicWin();
                }
            };
            
            function checkTicWin() {
                let wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for(let w of wins) {
                    if(ticBoard[w[0]] && ticBoard[w[0]] === ticBoard[w[1]] && ticBoard[w[0]] === ticBoard[w[2]]) {
                        ticGameOver = true;
                        if(ticBoard[w[0]] === 'X') {
                            document.getElementById('ticStatus').innerHTML = '🎉 فزتي! +5 نقاط';
                            addPoints(5);
                        } else {
                            document.getElementById('ticStatus').innerHTML = 'الكمبيوتر فاز';
                        }
                        return true;
                    }
                }
                if(!ticBoard.includes('')) {
                    ticGameOver = true;
                    document.getElementById('ticStatus').innerHTML = 'تعادل';
                    return true;
                }
                return false;
            }
            
            window.resetTic = function() {
                ticBoard = ['','','','','','','','',''];
                ticTurn = 'X';
                ticGameOver = false;
                renderTic();
                document.getElementById('ticStatus').innerHTML = 'دور X';
            };
            
            renderTic();
        <\/script>
    `;
}

///////////////////////////////////////////
// لعبة تخمين الأرقام
///////////////////////////////////////////
function guessNumberGame() {
    let secret = Math.floor(Math.random() * 100) + 1;
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">🔢 خمني الرقم</h3>
            <p>رقم من 1 إلى 100</p>
            <input type="number" id="guessInput" placeholder="تخمينك" style="padding: 10px; width: 200px;">
            <button onclick="window.checkGuess(${secret})">تحقق</button>
            <div class="status" id="guessStatus"></div>
            <button onclick="resetGuess()">🔄 رقم جديد</button>
        </div>
        <script>
            window.checkGuess = function(s) {
                let g = parseInt(document.getElementById('guessInput').value);
                let status = document.getElementById('guessStatus');
                if(g === s) {
                    status.innerHTML = '🎉 صح! +5 نقاط';
                    addPoints(5);
                } else if(g < s) {
                    status.innerHTML = 'الرقم أكبر';
                } else {
                    status.innerHTML = 'الرقم أصغر';
                }
            };
            
            window.resetGuess = function() {
                location.reload();
            };
        <\/script>
    `;
}

///////////////////////////////////////////
// لعبة حجر ورقة مقص
///////////////////////////////////////////
function rpsGame() {
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">✂️ حجر ورقة مقص</h3>
            <div style="margin: 30px;">
                <button onclick="window.playRPS('حجر')">🪨 حجر</button>
                <button onclick="window.playRPS('ورقة')">📄 ورقة</button>
                <button onclick="window.playRPS('مقص')">✂️ مقص</button>
            </div>
            <div class="status" id="rpsStatus"></div>
        </div>
        <script>
            window.playRPS = function(player) {
                let choices = ['حجر','ورقة','مقص'];
                let computer = choices[Math.floor(Math.random() * 3)];
                let result = '';
                
                if(player === computer) result = 'تعادل';
                else if(
                    (player === 'حجر' && computer === 'مقص') ||
                    (player === 'ورقة' && computer === 'حجر') ||
                    (player === 'مقص' && computer === 'ورقة')
                ) {
                    result = '🎉 فزتي! +3 نقاط';
                    addPoints(3);
                } else {
                    result = 'خسرتي';
                }
                
                document.getElementById('rpsStatus').innerHTML = 
                    'اخترتي: ' + player + '<br>الكمبيوتر: ' + computer + '<br>' + result;
            };
        <\/script>
    `;
}

///////////////////////////////////////////
// لعبة الجمع السريع
///////////////////////////////////////////
function additionGame() {
    let a = Math.floor(Math.random() * 20) + 1;
    let b = Math.floor(Math.random() * 20) + 1;
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">➕ جمع سريع</h3>
            <h2>${a} + ${b} = ؟</h2>
            <input type="number" id="addInput" placeholder="الإجابة" style="padding: 10px; width: 200px;">
            <button onclick="window.checkAdd(${a}, ${b})">تحقق</button>
            <div class="status" id="addStatus"></div>
            <button onclick="resetAdd()">🔄 مسألة جديدة</button>
        </div>
        <script>
            window.checkAdd = function(a, b) {
                let answer = parseInt(document.getElementById('addInput').value);
                if(answer === a + b) {
                    document.getElementById('addStatus').innerHTML = '🎉 صح! +1 نقطة';
                    addPoints(1);
                } else {
                    document.getElementById('addStatus').innerHTML = '❌ خطأ';
                }
            };
            
            window.resetAdd = function() {
                location.reload();
            };
        <\/script>
    `;
}

///////////////////////////////////////////
// لعبة تسريحة شعر
///////////////////////////////////////////
function hairGame() {
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">💇 تسريحة شعر</h3>
            <div style="font-size: 120px; margin: 20px;" id="hairModel">👧</div>
            <div class="style-options">
                <div class="style-item" onclick="window.changeHair('👧')">👧 قصير</div>
                <div class="style-item" onclick="window.changeHair('👩')">👩 طويل</div>
                <div class="style-item" onclick="window.changeHair('👸')">👸 تاج</div>
                <div class="style-item" onclick="window.changeHair('🦰')">🦰 أحمر</div>
            </div>
            <div class="color-picker">
                <div class="color-circle" style="background: #000;" onclick="window.changeHairColor('#000')"></div>
                <div class="color-circle" style="background: #8B4513;" onclick="window.changeHairColor('#8B4513')"></div>
                <div class="color-circle" style="background: #FFD700;" onclick="window.changeHairColor('#FFD700')"></div>
            </div>
            <div class="status" id="hairStatus"></div>
            <button onclick="window.saveHair()">💾 حفظ +5 نقاط</button>
        </div>
        <script>
            window.changeHair = function(style) {
                document.getElementById('hairModel').innerHTML = style;
            };
            
            window.changeHairColor = function(color) {
                document.getElementById('hairModel').style.color = color;
            };
            
            window.saveHair = function() {
                document.getElementById('hairStatus').innerHTML = '🎀 تسريحة رائعة! +5 نقاط';
                addPoints(5);
            };
        <\/script>
    `;
}

///////////////////////////////////////////
// لعبة تلوين أظافر
///////////////////////////////////////////
function nailsGame() {
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">💅 تلوين أظافر</h3>
            <div style="font-size: 120px; margin: 20px;" id="nails">🖐️</div>
            <div class="style-options">
                <div class="style-item" onclick="window.paintNail('red')">🔴 أحمر</div>
                <div class="style-item" onclick="window.paintNail('pink')">💗 وردي</div>
                <div class="style-item" onclick="window.paintNail('purple')">💜 بنفسجي</div>
                <div class="style-item" onclick="window.paintNail('gold')">💛 ذهبي</div>
            </div>
            <div class="status" id="nailsStatus"></div>
            <button onclick="window.saveNails()">💾 حفظ +3 نقاط</button>
        </div>
        <script>
            window.paintNail = function(color) {
                document.getElementById('nails').style.color = color;
                document.getElementById('nailsStatus').innerHTML = 'لون جميل';
            };
            
            window.saveNails = function() {
                document.getElementById('nailsStatus').innerHTML = '💅 أظافر رائعة! +3 نقاط';
                addPoints(3);
            };
        <\/script>
    `;
}

///////////////////////////////////////////
// لعبة فستان أميرة
///////////////////////////////////////////
function dressGame() {
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">👗 فستان أميرة</h3>
            <div style="font-size: 120px; margin: 20px;" id="dressModel">👸</div>
            <div class="style-options">
                <div class="style-item" onclick="window.changeDress('👗')">👗 قصير</div>
                <div class="style-item" onclick="window.changeDress('👘')">👘 طويل</div>
                <div class="style-item" onclick="window.changeDress('👰')">👰 زفاف</div>
            </div>
            <div class="color-picker">
                <div class="color-circle" style="background: #FF69B4;" onclick="window.changeDressColor('#FF69B4')"></div>
                <div class="color-circle" style="background: #87CEEB;" onclick="window.changeDressColor('#87CEEB')"></div>
                <div class="color-circle" style="background: #98FB98;" onclick="window.changeDressColor('#98FB98')"></div>
            </div>
            <div class="status" id="dressStatus"></div>
            <button onclick="window.saveDress()">💾 حفظ +7 نقاط</button>
        </div>
        <script>
            window.changeDress = function(dress) {
                document.getElementById('dressModel').innerHTML = '👸' + dress;
            };
            
            window.changeDressColor = function(color) {
                document.getElementById('dressModel').style.color = color;
            };
            
            window.saveDress = function() {
                document.getElementById('dressStatus').innerHTML = '👸 أميرة جميلة! +7 نقاط';
                addPoints(7);
            };
        <\/script>
    `;
}

///////////////////////////////////////////
// لعبة مكياج عيون
///////////////////////////////////////////
function makeupGame() {
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">👁️ مكياج عيون</h3>
            <div style="font-size: 120px; margin: 20px;" id="eyes">👀</div>
            <div class="style-options">
                <div class="style-item" onclick="window.addEyeshadow('pink')">💗 وردي</div>
                <div class="style-item" onclick="window.addEyeshadow('purple')">💜 بنفسجي</div>
                <div class="style-item" onclick="window.addEyeshadow('blue')">💙 أزرق</div>
                <div class="style-item" onclick="window.addEyeshadow('gold')">💛 ذهبي</div>
            </div>
            <div class="status" id="makeupStatus"></div>
            <button onclick="window.saveMakeup()">💾 حفظ +6 نقاط</button>
        </div>
        <script>
            window.addEyeshadow = function(color) {
                document.getElementById('eyes').innerHTML = '👁️✨';
                document.getElementById('makeupStatus').innerHTML = 'مكياج ' + color;
            };
            
            window.saveMakeup = function() {
                document.getElementById('makeupStatus').innerHTML = '👁️ مكياج رائع! +6 نقاط';
                addPoints(6);
            };
        <\/script>
    `;
}

///////////////////////////////////////////
// لعبة تزيين كعكة
///////////////////////////////////////////
function cakeGame() {
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">🍰 تزيين كعكة</h3>
            <div style="font-size: 120px; margin: 20px;" id="cake">🎂</div>
            <div class="style-options">
                <div class="style-item" onclick="window.addTopping('🍓')">🍓 فراولة</div>
                <div class="style-item" onclick="window.addTopping('🍫')">🍫 شوكولاتة</div>
                <div class="style-item" onclick="window.addTopping('🍒')">🍒 كرز</div>
                <div class="style-item" onclick="window.addTopping('🕯️')">🕯️ شمعة</div>
            </div>
            <div class="status" id="cakeStatus"></div>
            <button onclick="window.saveCake()">💾 حفظ +8 نقاط</button>
        </div>
        <script>
            window.addTopping = function(topping) {
                document.getElementById('cake').innerHTML = '🎂' + topping;
            };
            
            window.saveCake = function() {
                document.getElementById('cakeStatus').innerHTML = '🍰 كعكة جميلة! +8 نقاط';
                addPoints(8);
            };
        <\/script>
    `;
}

///////////////////////////////////////////
// لعبة مجوهرات
///////////////////////////////////////////
function jewelryGame() {
    return `
        <div style="text-align: center;">
            <h3 style="color: #ff69b4;">💎 مجوهرات</h3>
            <div style="font-size: 120px; margin: 20px;" id="jewelryModel">👸💎</div>
            <div class="style-options">
                <div class="style-item" onclick="window.addJewelry('💍')">💍 خاتم</div>
                <div class="style-item" onclick="window.addJewelry('📿')">📿 عقد</div>
                <div class="style-item" onclick="window.addJewelry('👑')">👑 تاج</div>
                <div class="style-item" onclick="window.addJewelry('✨')">✨ لمعان</div>
            </div>
            <div class="status" id="jewelryStatus"></div>
            <button onclick="window.saveJewelry()">💾 حفظ +6 نقاط</button>
        </div>
        <script>
            window.addJewelry = function(jewel) {
                document.getElementById('jewelryModel').innerHTML = '👸' + jewel;
            };
            
            window.saveJewelry = function() {
                document.getElementById('jewelryStatus').innerHTML = '👸 أميرة متألقة! +6 نقاط';
                addPoints(6);
            };
        <\/script>
    `;
}

// بدء التطبيق
displayGames();
</script>

</body>
</html>
